name: build & release .deb

# Build the Theia .deb set on Ubuntu 22.04 + 24.04. Every push/PR is a
# build-check (no upload); a vX.Y.Z tag additionally attaches the .debs to a
# GitHub Release. Runtime-library Depends are computed PER-RELEASE with
# dpkg-shlibdeps (no hardcoded sonames — they differ across Ubuntu releases).

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # needed to create/attach a GitHub Release on a tag

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        ubuntu: ["22.04", "24.04"]
    runs-on: ubuntu-${{ matrix.ubuntu }}
    steps:
      - uses: actions/checkout@v4
        # NOT submodules:recursive — .gitmodules uses SSH URLs
        # (git@github.com:perotheia/…), which the CI runner can't auth for an
        # unauthenticated checkout. Re-point to HTTPS + init below.

      - name: Check out submodules over HTTPS
        run: |
          # artheia + rf-theia (theia release builds both wheels for the
          # framework deb) + etcd (the per service links it). Override the
          # SSH submodule URLs with their public HTTPS equivalents.
          git config submodule.artheia.url https://github.com/perotheia/artheia.git
          git config submodule.rf-theia.url https://github.com/perotheia/rf-theia.git
          git submodule update --init artheia rf-theia third_party/etcd-cpp-apiv3

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config dpkg-dev \
            python3 python3-venv python3-pip \
            libnanopb-dev \
            libboost-system-dev libboost-thread-dev libboost-random-dev \
            libssl-dev libprotobuf-dev protobuf-compiler \
            libgrpc++-dev protobuf-compiler-grpc libabsl-dev \
            libcpprest-dev \
            libnftables-dev
          # The runtime/FC protos #include <pb.h> at the TOP level, but Ubuntu
          # 24.04's libnanopb-dev (0.4.8) nests the headers under
          # /usr/include/nanopb/. 22.04 ships them top-level. Symlink them up so
          # `#include <pb.h>` resolves on both — no-op when already top-level.
          if [ -f /usr/include/nanopb/pb.h ] && [ ! -e /usr/include/pb.h ]; then
            for h in pb.h pb_common.h pb_decode.h pb_encode.h; do
              sudo ln -sfn nanopb/"$h" /usr/include/"$h"
            done
          fi

      - name: Install Bazelisk (pins Bazel via .bazelversion)
        run: |
          sudo curl -fsSL -o /usr/local/bin/bazel \
            https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
          sudo chmod +x /usr/local/bin/bazel
          bazel version

      - name: Cache etcd-cpp-apiv3 build (by submodule SHA + ubuntu)
        id: etcd-cache
        uses: actions/cache@v4
        with:
          path: third_party/etcd-cpp-apiv3/install
          key: etcd-${{ matrix.ubuntu }}-${{ hashFiles('.gitmodules') }}-${{ hashFiles('third_party/etcd-cpp-apiv3/CMakeLists.txt') }}

      - name: Build etcd-cpp-apiv3 (CMake, out-of-Bazel)
        if: steps.etcd-cache.outputs.cache-hit != 'true'
        run: |
          cmake -S third_party/etcd-cpp-apiv3 \
                -B third_party/etcd-cpp-apiv3/build \
                -DCMAKE_INSTALL_PREFIX="$PWD/third_party/etcd-cpp-apiv3/install" \
                -DBUILD_ETCD_TESTS=OFF -DETCD_W_STRICT=OFF
          cmake --build third_party/etcd-cpp-apiv3/build -j"$(nproc)"
          cmake --install third_party/etcd-cpp-apiv3/build

      - name: Set up Python venv (artheia + nanopb generators run during the build)
        run: |
          python3 -m venv .venv
          ./.venv/bin/pip install --upgrade pip build
          ./.venv/bin/pip install -e artheia/
          # The proto genrules shell out to `nanopb_generator` (NOT an artheia
          # dep); install it into the venv so it's on PATH for the bazel build.
          ./.venv/bin/pip install nanopb

      - name: Build the .deb set (theia release)
        run: |
          export PATH="$PWD/.venv/bin:$PATH"
          # theia.py lives at tools/theia.py; the `./theia` shim execs it.
          ./theia release --arch host

      - name: Fix per-release runtime Depends (dpkg-shlibdeps)
        run: |
          ./.github/scripts/fix-deb-depends.sh "${{ matrix.ubuntu }}"

      - name: Stamp .deb filenames with the Ubuntu release
        id: stamp
        run: |
          mkdir -p out
          for f in dist/debian/*/*.deb; do
            base="$(basename "$f" .deb)"        # theia-services_0.1.0_amd64
            cp "$f" "out/${base%_*}_ubuntu${{ matrix.ubuntu }}_${base##*_}.deb"
          done
          ls -la out/

      - uses: actions/upload-artifact@v4
        with:
          name: theia-deb-ubuntu${{ matrix.ubuntu }}
          path: out/*.deb

  # theia-tools = the wxWidgets supervisor-GUI + rtdb. ISOLATED from `build`
  # (continue-on-error) so a GUI issue never fails the core framework/runtime/
  # services release. The GUI is built by its canonical CMakeLists.txt (not
  # bazel). 24.04 ONLY: the GUI needs wxWidgets 3.2, which is native to 24.04
  # but absent from stock Ubuntu 22.04 (jammy ships wx 3.0; 3.2 is not in the
  # archive/backports the runner sees). 22.04 operators run the GUI on a 24.04
  # box or build it locally.
  build-tools:
    strategy:
      fail-fast: false
      matrix:
        ubuntu: ["24.04"]
    runs-on: ubuntu-${{ matrix.ubuntu }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Check out etcd submodule from the GitHub mirror
        run: git submodule update --init third_party/etcd-cpp-apiv3

      - name: Install GUI build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config dpkg-dev \
            libprotobuf-dev protobuf-compiler \
            libgrpc++-dev protobuf-compiler-grpc \
            libwxgtk3.2-dev \
            libboost-system-dev libboost-thread-dev libboost-random-dev \
            libssl-dev libcpprest-dev

      - name: Cache etcd-cpp-apiv3 build (by submodule SHA + ubuntu)
        id: etcd-cache
        uses: actions/cache@v4
        with:
          path: third_party/etcd-cpp-apiv3/install
          key: etcd-${{ matrix.ubuntu }}-${{ hashFiles('.gitmodules') }}-${{ hashFiles('third_party/etcd-cpp-apiv3/CMakeLists.txt') }}

      - name: Build etcd-cpp-apiv3 (CMake) if not cached
        if: steps.etcd-cache.outputs.cache-hit != 'true'
        run: |
          cmake -S third_party/etcd-cpp-apiv3 \
                -B third_party/etcd-cpp-apiv3/build \
                -DCMAKE_INSTALL_PREFIX="$PWD/third_party/etcd-cpp-apiv3/install" \
                -DBUILD_ETCD_TESTS=OFF -DETCD_W_STRICT=OFF
          cmake --build third_party/etcd-cpp-apiv3/build -j"$(nproc)"
          cmake --install third_party/etcd-cpp-apiv3/build

      - name: Build + package theia-tools (supervisor-GUI + rtdb)
        run: ./.github/scripts/build-tools-deb.sh "${{ matrix.ubuntu }}"

      - name: Fix per-release runtime Depends (dpkg-shlibdeps)
        run: ./.github/scripts/fix-deb-depends.sh "${{ matrix.ubuntu }}"

      - name: Stamp the .deb filename with the Ubuntu release
        run: |
          mkdir -p out
          f="$(ls dist/debian/theia-tools/*.deb)"
          base="$(basename "$f" .deb)"
          cp "$f" "out/${base%_*}_ubuntu${{ matrix.ubuntu }}_${base##*_}.deb"
          ls -la out/

      - uses: actions/upload-artifact@v4
        with:
          name: theia-tools-deb-ubuntu${{ matrix.ubuntu }}
          path: out/*.deb

  release:
    needs: [build, build-tools]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: theia-*deb-ubuntu*
          path: artifacts
          merge-multiple: true
      - name: Attach .debs to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.deb
          fail_on_unmatched_files: true
          generate_release_notes: true
