name: rf-theia selftests (hermetic)

# Run the HERMETIC rf-theia selftests on every push/PR — the offline,
# pure-Python assertion suites that need no live supervisor/etcd and no C++
# build (just artheia + the rf-theia harness installed). Catches regressions in
# the testkit + the rig/topology/temporal/component keyword surfaces early.
#
# The LIVE suites (supervision/trace/sm — need a running stack) and the
# generator-regression suites (need bazel-built protos / the trace-decoder .so)
# are NOT run here; they stay dev-/release-gated. See
# docs/tasks/BACKLOG/rf-theia-testing-framework.md.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # artheia generator/DSL unit suite — the pure-Python pytest that gates the
  # manifest emitters, the supervisor-tree slicer, the autosar/proto generators,
  # etc. No C++, no live stack: catches generator regressions before the heavy
  # release-deb build runs.
  artheia-pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check out artheia from the GitHub mirror
        run: |
          git config submodule.artheia.url https://github.com/perotheia/artheia.git
          git submodule update --init artheia
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install artheia (+ test deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e "artheia/[dev]" || pip install -e artheia/ pytest pytest-snapshot
      - name: Run the artheia pytest suite
        run: python -m pytest artheia/ -q
      - name: Run the tools pytest suite (theia.py guards, migrate)
        # tools/test_*.py — pure-Python unit tests for the dev-loop CLI:
        # the supervisor-collision fail-fast guard (test_theia_start_guard.py)
        # + the migration applier (migrate/test_migrate.py). No live stack.
        run: python -m pytest tools/ -q

  hermetic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check out artheia + rf-theia from the GitHub mirror
        run: |
          git config submodule.artheia.url https://github.com/perotheia/artheia.git
          git config submodule.rf-theia.url https://github.com/perotheia/rf-theia.git
          git submodule update --init artheia rf-theia

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install artheia + rf-theia
        run: |
          python -m pip install --upgrade pip
          pip install -e artheia/
          pip install -e rf-theia/

      - name: Run the hermetic selftests
        env:
          RF_THEIA_WORKSPACE: ${{ github.workspace }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # The offline, pure-Python suites: rig/topology, temporal monitors,
          # distributed-actor components, and the keyword-load smoke. No live
          # stack, no C++ build.
          python -m robot \
            --include hermetic --exclude live \
            --outputdir out \
            testing/scenarios/_selftest/components/ \
            testing/scenarios/_selftest/keywords_load/ \
            testing/scenarios/_selftest/topology/ \
            testing/scenarios/_selftest/temporal_logic/

      - name: Run the hermetic per-FC temporal scenarios
        env:
          RF_THEIA_WORKSPACE: ${{ github.workspace }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Per-FC temporal-logic (Pair-2) scenarios for nm/sm/log/com — the
          # hermetic cases assert each FC's trace-stream shape (Eventually/
          # Always/Never over the real node names) with a synthetic TRC feed,
          # no live supervisor. The 'live' FSM cases (Start Statem Stack stages
          # a stack) are excluded — they run in the dev/release live tier.
          python -m robot \
            --include hermetic --exclude live \
            --outputdir out-fc \
            testing/scenarios/services/nm/ \
            testing/scenarios/services/sm/ \
            testing/scenarios/services/log/log_firehose_temporal.robot \
            testing/scenarios/services/com/com_firehose_temporal.robot

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selftest-report
          path: |
            out/
            out-fc/

  # The in-repo demo at demo/ is a real CONSUMING WORKSPACE (the `theia init`
  # shape: system/apps real, manifest/ rig, proto/, framework symlinked via
  # @pero_theia). Run its HERMETIC app tests — the artheia gen pipeline stages
  # (parse → gen-netgraph/routing/app-composition → manifest/rig resolution) a
  # real user exercises — from the demo workspace root. The live + live-bazel
  # stages (need a running stack / a bazel C++ build) stay gated, same as the
  # framework's live suites above.
  demo-workspace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check out artheia + rf-theia from the GitHub mirror
        run: |
          git config submodule.artheia.url https://github.com/perotheia/artheia.git
          git config submodule.rf-theia.url https://github.com/perotheia/rf-theia.git
          git submodule update --init artheia rf-theia

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install artheia + rf-theia
        run: |
          python -m pip install --upgrade pip
          pip install -e artheia/
          pip install -e rf-theia/

      - name: Demo consuming-workspace hermetic tests
        env:
          # The demo workspace is self-contained: PYTHONPATH=demo only. Its
          # `manifest` namespace package spans the demo's apps (manifest.apps,
          # manifest.<rig>) AND the framework's manifest.services — the latter
          # symlinked in at demo/manifest/services (mirroring a deb-installed
          # /opt/theia framework next to a user's own theia_ws). Repo-root is
          # deliberately NOT on the path: it would shadow the venv-installed
          # artheia with the ./artheia submodule checkout dir.
          PYTHONPATH: ${{ github.workspace }}/demo
          RF_THEIA_WORKSPACE: ${{ github.workspace }}/demo
        working-directory: demo
        run: |
          python -m robot \
            --include hermetic --exclude live --exclude live-bazel \
            --outputdir out \
            tests/demo_chain/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: demo-workspace-report
          path: demo/out/
