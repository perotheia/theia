---
# pero_theia GitLab CI — orchestrates builds across all component repos.
# Triggered on push to but_theia main; uses repo tool to sync workspace.

image: ubuntu:24.04

variables:
  REPO_URL: "git@cicd.skyway.porsche.com:PG50/pero_theia.git"
  BAZEL_VERSION: "9.1.0"
  ARM_GCC_VERSION: "7-2017-q4"
  ARM_GCC_URL: "https://developer.arm.com/-/media/Files/downloads/gnu-rm/7-2017q4/gcc-arm-none-eabi-7-2017-q4-major-linux.tar.bz2"
  ARM_GCC_ROOT: "/opt/gcc-arm-none-eabi-7-2017-q4"
  GIT_STRATEGY: none    # repo tool handles checkout

stages:
  - setup
  - build_host
  - build_firmware
  - test
  - package

# ── Shared setup template ──────────────────────────────────────────────────
.setup_workspace: &setup_workspace
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq
        git curl python3 python3-pip
        libpcap-dev libexpat1-dev
        gcc g++ make cmake
        pkg-config ca-certificates
    # repo tool
    - mkdir -p ~/.local/bin
    - curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo
        -o ~/.local/bin/repo
    - chmod a+x ~/.local/bin/repo
    - export PATH=~/.local/bin:$PATH
    # Bazelisk
    - curl -fsSL
        https://github.com/bazelbuild/bazelisk/releases/download/v1.29.0/bazelisk-linux-amd64
        -o ~/.local/bin/bazel
    - chmod a+x ~/.local/bin/bazel
    # Workspace sync
    - git config --global user.email "ci@pero-theia"
    - git config --global user.name  "pero-theia CI"
    - mkdir -p workspace && cd workspace
    - repo init -u "$REPO_URL" -b main --depth=1
    - repo sync -j8 --force-sync

# ── Stage: setup ──────────────────────────────────────────────────────────
toolchain:arm_gcc:
  stage: setup
  <<: *setup_workspace
  script:
    - cd workspace
    # Download CCS8-era arm-none-eabi if not cached
    - |
      if [ ! -f "$ARM_GCC_ROOT/bin/arm-none-eabi-gcc" ]; then
        mkdir -p $ARM_GCC_ROOT
        curl -fL "$ARM_GCC_URL" | tar -xj --strip-components=1 -C $ARM_GCC_ROOT
      fi
    - $ARM_GCC_ROOT/bin/arm-none-eabi-gcc --version
  cache:
    key: "arm-gcc-$ARM_GCC_VERSION"
    paths:
      - $ARM_GCC_ROOT

# ── Stage: build_host ─────────────────────────────────────────────────────
build:libcmpdecoder:
  stage: build_host
  <<: *setup_workspace
  script:
    - cd workspace
    - bazel build //pero_cmp_lnx/lib:cmpdecoder
        --config=linux --config=ci
  artifacts:
    paths: [workspace/bazel-bin/pero_cmp_lnx/lib/]
    expire_in: 1 hour

build:libgw:
  stage: build_host
  needs: [build:libcmpdecoder]
  <<: *setup_workspace
  script:
    - cd workspace
    - bazel build //pero_cmp_lnx/lib:gw
        //pero_cmp_gw_svc:cmp_gw
        //pero_cmp_gw_cln_demo:cmp_gw_client
        --config=linux --config=ci

build:libpsp:
  stage: build_host
  needs: []
  <<: *setup_workspace
  script:
    - cd workspace
    # PSP requires code generation first
    - cd mlbevo_gen2_cmp_psp && bash generate.sh && cd ..
    - bazel build //mlbevo_gen2_cmp_psp:psp
        --config=linux --config=ci

# ── Stage: build_firmware ──────────────────────────────────────────────────
build:hercules_firmware:
  stage: build_firmware
  needs: [toolchain:arm_gcc]
  <<: *setup_workspace
  script:
    - cd workspace
    - bazel build //pero_cmp_ti:pero_cmp_ti.elf
        --config=cortex_r4f --config=ci
  artifacts:
    paths:
      - workspace/bazel-bin/pero_cmp_ti/pero_cmp_ti.elf
    expire_in: 7 days

build:hercules_gw_firmware:
  stage: build_firmware
  needs: [toolchain:arm_gcc]
  <<: *setup_workspace
  script:
    - cd workspace
    - bazel build //pero_cmp_ti_gw:pero_cmp_ti_gw.elf
        --config=cortex_r4f --config=ci
  artifacts:
    paths:
      - workspace/bazel-bin/pero_cmp_ti_gw/pero_cmp_ti_gw.elf
    expire_in: 7 days

# ── Stage: test ───────────────────────────────────────────────────────────
test:host:
  stage: test
  needs: [build:libcmpdecoder, build:libpsp]
  <<: *setup_workspace
  script:
    - cd workspace
    - bazel test //pero_cmp_lnx/...
        --config=linux --config=ci
        --test_output=errors

# ── Stage: package ────────────────────────────────────────────────────────
package:psp:
  stage: package
  needs: [build:libpsp, test:host]
  only: [main, tags]
  <<: *setup_workspace
  script:
    - cd workspace
    - bazel build //mlbevo_gen2_cmp_psp:psp_tar --config=linux --config=ci
  artifacts:
    name: "psp-${CI_COMMIT_SHORT_SHA}"
    paths: [workspace/bazel-bin/mlbevo_gen2_cmp_psp/psp_tar.tar.gz]
    expire_in: 30 days
