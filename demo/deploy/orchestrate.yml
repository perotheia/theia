# demo/deploy/orchestrate.yml — generic, manifest-driven Theia deploy.
#
# Deploys ANY rig to its inventory hosts from the SERIALIZED manifest — no
# per-rig playbook. Each inventory host is in a group named after its manifest
# machine (demo/inventory/<rig>.ini), and demo/deploy/gen_ansible.py has emitted
# demo/deploy/<rig>/group_vars/<machine>.yml with that machine's arch + binary
# list + build_dir. This playbook reads those vars and, per host:
#
#   1. cross-build the machine's binaries for its arch (on the CONTROLLER, once
#      per arch) — bazel --platforms={{ bazel_platform }}
#   2. stage the built binaries → /opt/theia/bin/<bin>  (push over SSH)
#   3. setcap the supervisor
#   4. copy the machine's executor.json (the supervision tree) + config/*.json
#   5. (re)launch the supervisor with the manifest + scope env
#
# This REPLACES the one-off deploy-gnss.yml: the binary set, the tree, and the
# config all come from demo/build/<rig>/<machine>/ — change the rig, re-serialize,
# re-gen, re-run; no playbook edit.
#
# Run:
#   artheia serialize-manifest manifest.rpi4.rig --attr RIG --out demo/build/rpi4
#   demo/deploy/gen_ansible.py rpi4
#   ansible-playbook -i demo/inventory/rpi4.ini \
#       -e @demo/deploy/rpi4/group_vars/central.yml \
#       demo/deploy/orchestrate.yml
#   (or rely on group_vars auto-loading by group name — see the inventory note)
- name: "Theia orchestrate (generic, manifest-driven)"
  hosts: all
  become: true
  vars:
    theia_root: /opt/theia
    repo_root: "{{ playbook_dir }}/../.."     # demo/deploy → repo root
    # tipc_scope=cluster makes node services reachable across a TIPC bearer
    # (cross-machine tdb/fusion); "node" for a self-contained single box.
    tipc_scope: cluster
    gps_baud: 460800
  pre_tasks:
    - name: "Require per-machine group_vars (gen_ansible.py must have run)"
      ansible.builtin.assert:
        that:
          - machine is defined
          - bazel_platform is defined
          - binaries is defined
          - build_dir is defined
        fail_msg: >-
          No deploy vars for this host. Run:
          demo/deploy/gen_ansible.py <rig>  (and -i demo/inventory/<rig>.ini).

  tasks:
    # --- 1. cross-build on the controller (delegated to localhost) -----------
    # One bazel invocation builds every binary for this machine's arch. Runs on
    # the controller; the artifacts are then pushed. Deduped per arch by Ansible
    # (run_once won't do — different machines may differ — but bazel caches).
    - name: "Cross-build this machine's binaries ({{ bazel_platform }})"
      ansible.builtin.command:
        cmd: >-
          bazel build --platforms={{ bazel_platform }}
          {{ binaries | map(attribute='label') | unique | join(' ') }}
        chdir: "{{ repo_root }}"
      delegate_to: localhost
      become: false
      changed_when: true

    # --- 2. base dirs + stage the binaries -----------------------------------
    - name: "Base dirs"
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ theia_root }}/bin"
        - "{{ theia_root }}/config"

    - name: "Stop a running supervisor (clean restart)"
      ansible.builtin.shell: "pkill -x supervisor || true"
      changed_when: false

    - name: "Stage the built binaries → /opt/theia/bin"
      ansible.builtin.copy:
        # bazel-bin is the controller's output symlink for the LAST build, which
        # is this machine's arch (we just built it above). The label
        # //pkg/path:target → bazel-bin/pkg/path/<basename-of-target>; but our
        # bin name is the manifest start_cmd basename, so map label→path.
        src: "{{ repo_root }}/bazel-bin/{{ item.label | regex_replace('^//','') | regex_replace(':.*$','') }}/{{ item.label | regex_replace('^.*:','') }}"
        dest: "{{ theia_root }}/bin/{{ item.bin }}"
        mode: "0755"
      loop: "{{ binaries }}"
      loop_control:
        label: "{{ item.bin }}"

    - name: "setcap the supervisor (TIPC admin + sched)"
      community.general.capabilities:
        path: "{{ theia_root }}/bin/supervisor"
        capability: "{{ item }}"
        state: present
      loop:
        - cap_sys_nice+eip
        - cap_net_admin+eip
      failed_when: false

    # --- 3. the supervision tree + per-FC config from the manifest -----------
    - name: "Copy the machine's executor.json (the supervision tree)"
      ansible.builtin.copy:
        src: "{{ build_dir }}/executor.json"
        dest: "{{ theia_root }}/config/executor.json"
        mode: "0644"

    - name: "Find per-FC config profiles for this machine (controller-side)"
      ansible.builtin.find:
        paths: "{{ build_dir }}/config"
        patterns: "*.json"
      delegate_to: localhost
      become: false
      register: _fc_cfg
      failed_when: false

    - name: "Copy per-FC config → /opt/theia/config"
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: "{{ theia_root }}/config/{{ item.path | basename }}"
        mode: "0644"
      loop: "{{ _fc_cfg.files | default([]) }}"
      loop_control:
        label: "{{ item.path | basename }}"

    # --- 4. launch -----------------------------------------------------------
    - name: "Ensure TIPC loaded + free the GPS serial port"
      ansible.builtin.shell: |
        modprobe tipc 2>/dev/null || true
        systemctl stop gpsd gpsd.socket 2>/dev/null || true
        fuser -k /dev/serial0 2>/dev/null || true
        true
      changed_when: false

    - name: "Launch the supervisor (detached; forks the tree from executor.json)"
      ansible.builtin.shell: |
        cd {{ theia_root }}
        THEIA_SUPERVISOR_MANIFEST={{ theia_root }}/config/executor.json \
        THEIA_CONFIG_DIR={{ theia_root }}/config \
        THEIA_TIPC_SCOPE={{ tipc_scope }} \
        THEIA_GPS_BAUD={{ gps_baud }} \
        setsid {{ theia_root }}/bin/supervisor \
          > {{ theia_root }}/supervisor.log 2>&1 < /dev/null &
        sleep 3
        pgrep -x supervisor >/dev/null \
          && echo "supervisor up on {{ machine }} (pid $(pgrep -x supervisor))" \
          || { echo "supervisor FAILED — tail:"; tail -5 {{ theia_root }}/supervisor.log; exit 1; }
      args:
        executable: /bin/bash
      register: _sup
      changed_when: true

    - name: "Result"
      ansible.builtin.debug:
        var: _sup.stdout_lines
