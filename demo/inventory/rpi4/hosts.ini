# demo/inventory/rpi4/hosts.ini — deploy targets for the `rpi4` rig.
#
# Each manifest MACHINE (demo/build/rpi4/machines.json) → its physical SSH box.
# The inventory GROUP name == the machine name, so Ansible auto-loads this rig's
# per-machine deploy vars from the sibling group_vars/<machine>.yml that
# demo/deploy/gen_ansible.py generates. The manifest carries the LOGICAL facts
# (arch, binaries, supervision tree); this file carries the DEPLOY facts
# (which box, which user) — the one thing the .art can't know.
[central]
rig1-central  ansible_host=10.0.0.22  ansible_user=axadmin
