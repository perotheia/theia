# Theia Ansible — agentless deploy controller config.
#
# The security model: a controller pushes over SSH (Controller ──SSH──> Device);
# NO standing convergence agent on the rig (that was Puppet's model). Mender is
# the ONLY persistent agent on the rig, and it does OTA only. Everything here is
# controller-initiated and ephemeral.
[defaults]
inventory          = inventory/hosts
host_key_checking  = False
retry_files_enabled = False
# stdout_callback `yaml` needs community.general; leave the default to keep the
# scaffold dependency-free. Set it locally if you have the collection installed.
# The artheia manifest tree is the source of truth; tasks read it from here on the
# controller and push the per-machine slice. Override per-run with -e manifest_dir=…
roles_path         = roles

[privilege_escalation]
become        = True
become_method = sudo

[ssh_connection]
pipelining = True
ssh_args   = -o ControlMaster=auto -o ControlPersist=60s
