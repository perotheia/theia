# theia deploy-gnss — push the GNSS time-sync stack (supervisor + log[trace] +
# tsync RTK) to the rpi4 (rig1-central) over SSH and (re)start the supervisor.
#
# A FOCUSED variant of orchestrate.yml for the ZED-F9R bring-up: instead of a
# full per-machine .deb it stages the three cross-compiled aarch64 binaries this
# demo needs, the GNSS executor tree (root → gnss_sup → {log, tsync}), and the
# tsync deploy params (config/tsync.json: gps_baud 460800, poll_ms 100). The
# supervisor forks log + tsync; tsync publishes NavSatFix/Odometry, whose trace
# egress reaches log[trace] — observable from the host with `tdb tracecat`.
#
# Vars (override with -e):
#   bin_src   : controller dir holding the aarch64 binaries (bazel-out symlink)
#   deploy_src: controller dir holding central/config/{executor,tsync}.json
#   gps_baud  : receiver UART1 baud (default 460800)
#
# Run:  ansible-playbook deploy-gnss.yml -l rig1-central \
#         -e bin_src=$PWD/../../bazel-out/k8-fastbuild/bin \
#         -e deploy_src=/tmp/gnss_deploy
- name: "Theia GNSS stack → rpi4 (supervisor + log[trace] + tsync RTK)"
  hosts: all
  become: true
  vars:
    theia_root: /opt/theia
    gps_baud: 460800
    # CLUSTER → node services bind TIPC_CLUSTER_SCOPE, reachable across the TIPC
    # UDP/eth bearer (so `tdb tracecat` on the host subscribes to this rpi4's
    # log[trace]). Use "node" for a self-contained single-machine deploy.
    tipc_scope: cluster
  tasks:
    - name: "Base dirs (/opt/theia/{bin,config})"
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ theia_root }}/bin"
        - "{{ theia_root }}/config"

    - name: "Stop any running supervisor (clean restart)"
      ansible.builtin.shell: "pkill -x supervisor || true"
      changed_when: false

    - name: "Copy the aarch64 binaries → /opt/theia/bin"
      ansible.builtin.copy:
        src: "{{ bin_src }}/{{ item.src }}"
        dest: "{{ theia_root }}/bin/{{ item.name }}"
        mode: "0755"
      loop:
        - { src: "platform/supervisor/main/supervisor", name: "supervisor" }
        - { src: "services/log/main/log",               name: "log" }
        - { src: "services/tsync/main/tsync",            name: "tsync" }

    - name: "setcap on the supervisor (CAP_SYS_NICE/NET_ADMIN for TIPC + sched)"
      community.general.capabilities:
        path: "{{ theia_root }}/bin/supervisor"
        capability: "{{ item }}"
        state: present
      loop:
        - cap_sys_nice+eip
        - cap_net_admin+eip
      failed_when: false   # tolerate hosts without the caps module / privilege

    - name: "Copy the GNSS executor tree (root → gnss_sup → log + tsync)"
      ansible.builtin.copy:
        src: "{{ deploy_src }}/central/config/executor.json"
        dest: "{{ theia_root }}/config/executor.json"
        mode: "0644"

    - name: "Copy tsync deploy params (gps_baud / poll_ms) → config/tsync.json"
      ansible.builtin.copy:
        src: "{{ deploy_src }}/central/config/tsync.json"
        dest: "{{ theia_root }}/config/tsync.json"
        mode: "0644"

    - name: "Ensure TIPC is loaded (the bus the supervisor + trace egress use)"
      community.general.modprobe:
        name: tipc
        state: present
      failed_when: false

    - name: "Free the GPS serial port (gpsd would hold it)"
      ansible.builtin.shell: "systemctl stop gpsd gpsd.socket 2>/dev/null; fuser -k /dev/serial0 2>/dev/null; true"
      changed_when: false

    - name: "Launch the supervisor (detached; it forks log + tsync from executor.json)"
      ansible.builtin.shell: |
        cd {{ theia_root }}
        THEIA_SUPERVISOR_MANIFEST={{ theia_root }}/config/executor.json \
        THEIA_CONFIG_DIR={{ theia_root }}/config \
        THEIA_GPS_BAUD={{ gps_baud }} \
        THEIA_TIPC_SCOPE={{ tipc_scope }} \
        setsid {{ theia_root }}/bin/supervisor \
          > {{ theia_root }}/supervisor.log 2>&1 < /dev/null &
        sleep 3
        pgrep -x supervisor >/dev/null && echo "supervisor up (pid $(pgrep -x supervisor))" || echo "supervisor FAILED — see supervisor.log"
      args:
        chdir: "{{ theia_root }}"
        executable: /bin/bash
      register: _sup
      changed_when: true

    - name: "Supervisor launch result"
      ansible.builtin.debug:
        var: _sup.stdout_lines
