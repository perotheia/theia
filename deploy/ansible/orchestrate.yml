# theia orchestrate — Phase 2: install the binaries + the REAL config. Pushed
# over SSH; the frequent work.
#
# Phases:
#   1. copy the per-machine <machine>.deb to the rig + dpkg --install (--force-
#      overwrite); drops every binary at /opt/theia/bin/<name>
#   2. setcap the binaries (the cap contract in tasks/setcap.yml — caps clear on
#      a fresh copy, so this runs AFTER install)
#   3. copy the REAL executor.json from <machine>/executor.json (replaces the
#      empty tree Phase 1 seeded) + the per-FC config/<fc>.json profiles
#   4. notify the supervisor to reload (tdb reload) — handler, fires only on change
#
# Run:  ansible-playbook orchestrate.yml -l rpi4
- name: "Theia orchestrate (Phase 2 — binaries + real config)"
  hosts: all
  become: true
  vars:
    theia_root: /opt/theia
    deb_src: "{{ manifest_dir }}/{{ machine }}/{{ machine }}.deb"
    executor_src: "{{ manifest_dir }}/{{ machine }}/executor.json"
    config_src_dir: "{{ manifest_dir }}/{{ machine }}/config"
  handlers:
    # Reload the supervisor (no blanket restart). Fires only when executor.json
    # changed AND tdb is present (the no-downtime path); a missing tdb is tolerated.
    - name: Reload supervisor
      ansible.builtin.command: "{{ theia_root }}/bin/tdb reload"
      args:
        removes: "{{ theia_root }}/bin/tdb"   # only run if tdb exists
      listen: "reload supervisor"
  tasks:
    - name: "Base dirs"
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ theia_root }}"
        - "{{ theia_root }}/config"
        - "{{ theia_root }}/ipk"

    - name: "Include bundle install (.deb → /opt/theia/bin)"
      ansible.builtin.include_tasks: tasks/install-bundle.yml

    - name: "Include setcap (the capability contract)"
      ansible.builtin.include_tasks: tasks/setcap.yml

    - name: "Include real config (executor.json + per-FC profiles)"
      ansible.builtin.include_tasks: tasks/seed-config.yml
