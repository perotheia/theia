# install-mender.yml — install the Mender client (the ONE persistent agent on the
# rig; OTA only) + the theia-release custom update module + the Mender→UCM state
# script. == the new agentless analogue of "provisioning installs the convergence
# agent" — except Mender does OTA, NOT general config (that's controller-pushed).
#
# Theia does NOT use Mender's rootfs A/B; the theia-release module lands releases
# as /opt/theia/releases/<ver> + a `current` symlink switch (see deploy/mender/).
- name: "Install mender-client (apt; distro package)"
  ansible.builtin.apt:
    name: mender-client
    state: present
    update_cache: true
  failed_when: false          # some distros need the mender apt repo first; tolerate
  register: _mender_apt

- name: "Ensure the Mender state dirs"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /var/lib/mender
    - /etc/mender

- name: "Seed the Mender device identity (device_type + artifact_info)"
  # mender install gates on /var/lib/mender/device_type matching the artifact's
  # compatible-devices (theia-rig), and reads /etc/mender/artifact_info for the
  # current artifact name. On a server-enrolled rig these come from enrolment;
  # for standalone OTA we seed them so `mender install` works out of the box.
  ansible.builtin.copy:
    dest: "{{ item.path }}"
    content: "{{ item.content }}\n"
    mode: "0644"
  loop:
    - { path: /var/lib/mender/device_type, content: "device_type=theia-rig" }
    - { path: /etc/mender/artifact_info, content: "artifact_name=unprovisioned" }
  loop_control:
    label: "{{ item.path }}"

- name: "Ensure the custom update-module dir"
  ansible.builtin.file:
    path: /usr/share/mender/modules/v3
    state: directory
    mode: "0755"

- name: "Push the theia-release update module (release-dir + symlink, NOT A/B)"
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../mender/modules/theia-release"
    dest: /usr/share/mender/modules/v3/theia-release
    mode: "0755"

- name: "Ensure the Mender scripts dir"
  ansible.builtin.file:
    path: /etc/mender/scripts
    state: directory
    mode: "0755"

- name: "Push the Mender→UCM state script + the UCM adopter it calls"
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../mender/state-scripts/{{ item }}"
    dest: "/etc/mender/scripts/{{ item }}"
    mode: "0755"
  loop:
    - ArtifactInstall_Leave_01_ucm-request   # the Mender hook
    - ucm-adopt.py                            # hands the landed release to UCM

# Tailscale/VPN enrolment is its OWN flow (tools/rig-enroll over com gRPC) — not
# here. This task only lands the OTA agent + the theia-release customization.
