# theia provision — Phase 1: the cheap, stable base. Pushed over SSH from the
# controller; no agent on the rig.
#
# Phases:
#   1. /opt/theia + /opt/theia/config dirs
#   2. OS packages from <machine>/machine.json os_packages (apt source, minus
#      etcd-server which is the cluster singleton below)
#   3. etcd-server ONLY on the etcd_machine (skip if etcd_external)
#   4. an EMPTY executor.json (replace=no) so the supervisor boots + supervises
#      nothing — the Phase-1 checkpoint
#   5. install + enrol the Mender client (the one persistent agent; OTA only)
#
# Run:  ansible-playbook provision.yml -l rpi4
#       (theia.py `provision <machine>` wraps this, limiting to the host whose
#        machine= matches)
- name: "Resolve the deploy target (S3-EXCLUSIVE — no registry)"
  hosts: localhost
  gather_facts: false
  vars:
    target: "{{ target | mandatory }}"
  tasks:
    # colony is S3-EXCLUSIVE: every field comes from the -e vars the GS passes
    # (--host/ansible_host, role/machine, runtime_version) + inventory constants
    # (s3_endpoint, etc.). No registry file, no legacy/CLI fallback. ansible_host
    # is mandatory — the GS always provides it (SSH-probed from Mender).
    - name: "Require ansible_host (the GS provides it; no registry fallback)"
      ansible.builtin.assert:
        that:
          - ansible_host is defined
          - ansible_host | default('') | length > 0
        fail_msg: >-
          ansible_host is required (colony is S3-exclusive — no registry). The
          GS passes --host <ip> per target; a bare CLI run must pass -e
          ansible_host=<ip> -e role=master|zonal.
    - name: "Resolve S3 vars for the manifest fetch"
      ansible.builtin.set_fact:
        s3_endpoint: "{{ s3_endpoint | default('') }}"
        s3_runtime_bucket: "{{ s3_runtime_bucket | default('theia-runtime') }}"
        runtime_version: "{{ runtime_version | default('') }}"
        machine: "{{ role | default(machine | default('')) }}"
        manifest_dir: "{{ manifest_dir }}"
        theia_run_src: "{{ theia_run_src | default('') }}"
    - name: "Fetch the deploy manifest from S3 (repoints manifest_dir)"
      ansible.builtin.include_tasks: tasks/fetch-manifest-s3.yml

    - name: "Add the resolved target as an in-memory host"
      ansible.builtin.add_host:
        name: "{{ target }}"
        groups: _provision_targets
        ansible_host: "{{ ansible_host }}"
        ansible_user: "{{ ansible_user | default('root') }}"
        # Optional transport overrides: a non-standard SSH port (two host-network
        # board containers can't both bind :22, so one runs sshd on e.g. 2222), or
        # a non-SSH connection. Default SSH:22.
        ansible_port: "{{ ansible_port | default(omit) }}"
        # CONNECTION: read a DEDICATED var (target_connection), NOT ansible_connection.
        # This add_host runs inside the `hosts: localhost` resolve-play, where
        # ansible_connection is ALREADY defined as 'local' (localhost's implicit
        # connection). `{{ ansible_connection | default('ssh') }}` would therefore
        # inherit 'local' — the added board host would then run every task ON THE
        # CONTROLLER (copies landing in the controller's /usr/share/mender, deploys
        # silently no-op'ing the board). The docker-test-rig path overrides with
        # -e target_connection=community.docker.docker.
        ansible_connection: "{{ target_connection | default('ssh') }}"
        machine: "{{ role | default(machine | default('')) }}"
        # Mender compatibility gate: the device_type the rig enrols as. The
        # gateway board enrols as `theia-gateway` so the gateway app artifact
        # (compatible-devices: [theia-gateway]) targets it and the central/compute
        # role artifacts (theia-rig) don't. From -e (GS) / inventory; else theia-rig.
        mender_device_type: "{{ mender_device_type | default('theia-rig') }}"
        # L4-B: the cross-board TIPC eth bearer device (e.g. eth0). Empty/unset →
        # single-board rig, no bearer (tipc-bearer.yml is a no-op).
        tipc_bearer: "{{ tipc_bearer | default('') }}"
        # etcd knobs (etcd.yml). etcd_external=true → don't install/start an etcd
        # (the host/runner already runs one, e.g. a host-network container rig); the
        # listen/advertise hosts template the shared-etcd URLs. Must be threaded
        # through add_host or the etcd task sees the default (false) and collides.
        etcd_external: "{{ etcd_external | default((role | default('')) == 'zonal') }}"
        etcd_listen_host: "{{ etcd_listen_host | default('127.0.0.1') }}"
        etcd_advertise_host: "{{ etcd_advertise_host | default(ansible_host | default('127.0.0.1')) }}"
        # Post-fetch S3 vars: the manifest cache + OTA asset paths the fetch task
        # repointed on localhost — thread them so the play host reads from S3.
        manifest_dir: "{{ manifest_dir }}"
        theia_run_src: "{{ theia_run_src | default('') }}"
        mender_artifacts_dir: "{{ mender_artifacts_dir | default('') }}"

- name: "Theia provision (Phase 1 — base + Mender client)"
  hosts: _provision_targets
  become: true
  vars:
    theia_root: /opt/theia
    # the per-host machine.json on the CONTROLLER (read with the from_json filter)
    machine_json_path: "{{ manifest_dir }}/{{ machine }}/machine.json"
    # The on-device Mender artifacts (theia-swp/theia-app/theia-release modules +
    # Mender→UCM state scripts) ride in the S3 runtime manifest (platform/runtime/
    # ota/) — the fetch task set mender_artifacts_dir to <cache>/ota and threaded
    # it through add_host. Don't re-derive it here (that shadowed the S3 value).
    # A fallback via _mender_artifacts_default only when the hostvar is empty (a
    # local-checkout run with no S3).
    _mender_artifacts_default: "{{ manifest_dir }}/../../platform/runtime/ota"
  tasks:
    - name: "Base dirs"
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ theia_root }}"
        - "{{ theia_root }}/config"

    - name: "Include OS-package install (from machine.json os_packages)"
      ansible.builtin.include_tasks: tasks/os-packages.yml

    - name: "Include etcd (cluster singleton)"
      ansible.builtin.include_tasks: tasks/etcd.yml

    - name: "Include the cross-board TIPC bearer (L4-B multi-board)"
      ansible.builtin.include_tasks: tasks/tipc-bearer.yml

    - name: "Seed EMPTY executor.json (never clobber a real tree)"
      ansible.builtin.copy:
        dest: "{{ theia_root }}/config/executor.json"
        force: false            # == puppet replace=false: seed only on greenfield
        mode: "0644"
        content: |
          {"name":"root","children":[]}

    - name: "Include Mender client install + enrol"
      ansible.builtin.include_tasks: tasks/install-mender.yml
