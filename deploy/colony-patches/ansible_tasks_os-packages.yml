# os-packages.yml — install the apt os_packages this host declares in machine.json
# (the Linux daemons the prebuilt Providers fork: linuxptp/chrony/gpsd for tsync,
# …). etcd-server is filtered out here — it's the cluster singleton (etcd.yml).
# == provisioning.pp step 1.
#
# machine.json lives on the CONTROLLER; read it with from_json. When it's absent
# (bare bring-up, no emitted manifest) skip — only the etcd special-case runs.
# machine_json_path derives from manifest_dir; with S3 the fetch repointed it to
# the controller-local cache. stat FIRST so a missing slice (a role-generic bare
# provision) skips cleanly instead of a hard lookup() error.
# BASE packages every theia rig needs regardless of what machine.json declares:
# procps (pgrep/pkill) is used by etcd-start.sh + the supervisor's process
# management. Install it FIRST so the etcd task (which runs right after) has
# pgrep — a fresh minimal container ships without it. Idempotent.
- name: "Install base os packages (procps — pgrep for etcd-start + supervisor)"
  ansible.builtin.apt:
    name:
      - procps
    state: present
    update_cache: true
  failed_when: false   # offline rig: tolerate; a real board's base image has it

- name: "Stat machine.json (controller-side) — {{ machine }}"
  ansible.builtin.stat:
    path: "{{ machine_json_path }}"
  delegate_to: localhost
  become: false
  register: _mj_stat
- name: "Read machine.json (controller-side) — {{ machine }}"
  ansible.builtin.set_fact:
    _machine_doc: "{{ lookup('file', machine_json_path) | from_json }}"
  delegate_to: localhost
  become: false
  when: _mj_stat.stat.exists

- name: "Compute apt os_packages (minus etcd-server)"
  ansible.builtin.set_fact:
    _apt_pkgs: >-
      {{ (_machine_doc.machine.os_packages | default([]))
         | selectattr('source', 'equalto', 'apt')
         | rejectattr('name', 'equalto', 'etcd-server')
         | map(attribute='name') | list }}
  when: _machine_doc is defined

- name: "Apt install os_packages"
  ansible.builtin.apt:
    name: "{{ _apt_pkgs }}"
    state: present
    update_cache: true
  when: _apt_pkgs is defined and _apt_pkgs | length > 0
