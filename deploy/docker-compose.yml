# deploy/docker-compose.yml — two-host Theia bringup in Docker (host network).
#
# Topology (matches demo/manifest/zonal_rig.py::DemoSoftware):
#
#   central — services (the FC daemons) + gateway.
#   compute — demo binaries.
#
# Both services run on `network_mode: host` so they share the HOST network
# AND the host TIPC namespace — the supervisor + FC nodes bind to localhost,
# and a host-side `tdb` (which speaks TIPC via artheia.probe) can reach the
# containerized supervisor directly. This is the dev default until proper
# cross-container TIPC links land (see
# docs/tasks/BACKLOG/container-tipc-reachability.md).
#
# Consequences of host networking:
#   - No `ports:` mapping (containers bind host ports directly).
#   - No custom bridge network / aliases (those are bridge-only). Service
#     name resolution between containers is by localhost, not DNS aliases.
#   - `hostname:` is ignored (the container sees the host's hostname);
#     run-supervisor.sh keys off the HOSTNAME env var instead, set below.
#   - com's gRPC bridge (when re-enabled — currently hidden from the build)
#     would collide on :7700; compute overrides THEIA_COM_LISTEN to :7701.
#     tdb itself uses TIPC, not gRPC, so this doesn't affect `tdb ps`.
#
# Pre-flight (run from workspace root, venv on PATH):
#
#   export PATH="$PWD/.venv/bin:$PATH"
#   theia dist                       # bazel build the @rig_zonal bundles
#   bazel build //platform/supervisor/main:supervisor
#   ./deploy/stage.sh                # stage into deploy/.staging/
#   docker compose -f deploy/docker-compose.yml build
#   docker compose -f deploy/docker-compose.yml up
#
# Drive it from the host:  tdb ps   (shares the host TIPC namespace).
# Tear-down:  Ctrl-C, then `docker compose -f deploy/docker-compose.yml down`.
#
# NOTE: the supervisor dropped etcd — live state flows over the TIPC
# NodeEdge/NodeState firehose, not etcd. No etcd endpoint/lib mounts here.

services:

  central:
    image: theia-central:latest
    build:
      context: .                       # deploy/
      dockerfile: central/Dockerfile
    container_name: theia-central
    network_mode: host
    volumes:
      # Per-machine .ipk + executor.json + machines.json Bazel emits via
      # @rig_zonal//:all. stage.sh copies them into
      # deploy/.staging/<machine_name>/ipk/ where <machine_name> matches the
      # rig MachineManifest.name (`central_host`, `compute_host`).
      - ./.staging/central_host/ipk:/opt/theia/ipk:ro
      # Puppet manifests (central.pp) + the shared theia module.
      - ./puppet:/etc/puppet:ro
      # Supervisor binary (bazel gen-app FC //platform/supervisor/main:supervisor).
      # Until packaged in the .ipk, bind-mount it directly, read-only.
      - ../bazel-bin/platform/supervisor/main/supervisor:/usr/bin/theia-supervisor:ro
      # Logs persist to ./logs/ for inspection after teardown.
      - ./logs/central:/var/log/theia
    environment:
      - HOSTNAME=central
      - TZ=UTC
    restart: unless-stopped

  compute:
    image: theia-compute:latest
    build:
      context: .
      dockerfile: compute/Dockerfile
    container_name: theia-compute
    network_mode: host
    volumes:
      - ./.staging/compute_host/ipk:/opt/theia/ipk:ro
      - ./puppet:/etc/puppet:ro
      - ../bazel-bin/platform/supervisor/main/supervisor:/usr/bin/theia-supervisor:ro
      - ./logs/compute:/var/log/theia
    environment:
      - HOSTNAME=compute
      - TZ=UTC
      # Avoid a :7700 collision with central's com bridge on the shared host
      # network (com is currently hidden from the build; harmless either way).
      - THEIA_COM_LISTEN=0.0.0.0:7701
    restart: unless-stopped
    # compute can't start until central is up — the gateway lives on central
    # and the demo's TIPC clients reach it via the shared host TIPC namespace.
    depends_on:
      - central
