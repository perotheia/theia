# deploy/docker-compose.yml — local two-rig Theia bringup in Docker.
#
# The containers are treated AS RIGS: bare boards that colony provisions over
# SSH, driven from the Ground Station UI — NOT self-provisioning. This is the
# local mirror of a real fleet (rpi4 + jetson), but all-amd64 (host abi), so no
# cross-build and no physical board is needed to exercise the full
# enrol → provision (runtime) → deploy (app) → Distribution flow.
#
#   central — a rig (sshd :2201). Provisioned with the `central` manifest slice.
#   compute — a rig (sshd :2202). Provisioned with the `compute` slice.
#
# Both run `network_mode: host` → they share the HOST network AND the host TIPC
# namespace (one TIPC nametable; central=instance 0, compute=instance 1 per the
# manifest). Because they share the host port space, their sshd ports MUST
# differ (2201/2202) — a real rig owns :22, but two rigs on one host net can't.
#
# Bring up (from workspace root, venv on PATH):
#   export PATH="$PWD/.venv/bin:$PATH"
#   docker compose -f deploy/docker-compose.yml build
#   docker compose -f deploy/docker-compose.yml up -d
#   # then, from the Ground Station UI:
#   #   Connect a new device → SSH-probe central @ <dalek-ip>:2201 / compute :2202
#   #   (colony-api's pubkey is already in the rig's authorized_keys)
#   #   provision (runtime, from S3) → deploy a Distribution (app, via Mender)
#
# Drive TIPC directly from the host:  tdb ps   (shares the host TIPC namespace).
# Tear-down:  docker compose -f deploy/docker-compose.yml down.

services:

  # etcd — ONE per cluster (central's machine.json declares it). Behind the
  # `etcd` profile because a dev box usually already runs etcd on
  # 127.0.0.1:2379 (under network_mode: host a second one collides on :2380).
  # Bring it up only on a clean host with no etcd:
  #     docker compose --profile etcd up -d
  etcd:
    image: quay.io/coreos/etcd:v3.5.12
    container_name: theia-etcd
    profiles: ["etcd"]
    network_mode: host
    command:
      - /usr/local/bin/etcd
      - --name=theia0
      - --data-dir=/var/lib/theia-etcd
      - --listen-client-urls=http://127.0.0.1:2379
      - --advertise-client-urls=http://127.0.0.1:2379
      - --listen-peer-urls=http://127.0.0.1:2380
      - --initial-advertise-peer-urls=http://127.0.0.1:2380
      - --initial-cluster=theia0=http://127.0.0.1:2380
      - --initial-cluster-state=new
      - --initial-cluster-token=theia-etcd-token
    volumes:
      - ./logs/etcd:/var/lib/theia-etcd
    restart: unless-stopped

  # central — a bare rig colony provisions over SSH (:2201). The coordinator
  # board: runs the cluster singletons (supervisor, com, per, vucm, …) once
  # provisioned. Empty until colony pushes a release.
  central:
    image: theia-rig:latest
    build:
      context: .                       # deploy/
      dockerfile: rig/Dockerfile
    container_name: theia-central
    hostname: central
    network_mode: host
    command: ["-p", "2201"]            # sshd port (host net → must not be :22)
    # Capabilities the Theia binaries hold (the setcap contract colony applies
    # at provision, deploy/ansible setcap.yml). cap_add raises the bounding/
    # ambient set so the file caps (+eip) take on exec:
    #   SYS_NICE  — supervisor realtime sched + CPU affinity on FC node threads.
    #   NET_RAW + NET_ADMIN — gateway AF_PACKET / raw CAN+UDP (when re-added).
    cap_add:
      - SYS_NICE
      - NET_RAW
      - NET_ADMIN
    volumes:
      - ./logs/central:/var/log/theia
      # Persist the Mender device key + auth token across recreate, so the rig
      # stays the SAME accepted device (a fresh key each boot would need re-accept).
      - central-mender:/var/lib/mender
    environment:
      - TZ=UTC
    restart: unless-stopped

  # compute — a second bare rig (:2202). The compute board: runs the app's
  # compute-role processes; reached over TIPC through the shared host namespace
  # and over com THROUGH central (central is the only remote com endpoint).
  compute:
    image: theia-rig:latest
    build:
      context: .
      dockerfile: rig/Dockerfile
    container_name: theia-compute
    hostname: compute
    network_mode: host
    command: ["-p", "2202"]
    cap_add:
      - SYS_NICE
      - NET_RAW
      - NET_ADMIN
    volumes:
      - ./logs/compute:/var/log/theia
      - compute-mender:/var/lib/mender   # persist the Mender key + token (see central)
    environment:
      - TZ=UTC
    restart: unless-stopped

volumes:
  central-mender:
  compute-mender:
