# deploy/docker-compose.yml — two-host Theia bringup in Docker (host network).
#
# Topology (matches demo/manifest/zonal_rig.py::DemoSoftware):
#
#   central — services (the FC daemons) + gateway.
#   compute — demo binaries.
#
# Both services run on `network_mode: host` so they share the HOST network AND
# the host TIPC namespace — the supervisor + FC nodes bind to localhost, and a
# host-side `tdb` (TIPC via artheia.probe) can reach the containerized
# supervisor directly.
#
# These containers DO NOT self-provision. They start EMPTY (/opt/theia/{bin,
# config} are empty dirs from the image) and the entrypoint loops with a
# "waiting for orchestration" message until provisioning has been pushed in
# FROM OUTSIDE — an operator / CI runs `theia provision` + `theia orchestrate`
# (puppet) against the container, which lays down /opt/theia/bin/supervisor +
# /opt/theia/config/executor.json. The entrypoint then runs the supervisor.
# On `docker compose down` the container is destroyed → back to empty; a fresh
# `up` waits again until re-provisioned. (No persistent volume by design.)
#
# Pre-flight (from workspace root, venv on PATH):
#
#   export PATH="$PWD/.venv/bin:$PATH"
#   docker compose -f deploy/docker-compose.yml build
#   docker compose -f deploy/docker-compose.yml up          # waits for orchestration
#   # then, from the host, provision + orchestrate each machine into its container
#
# Drive it from the host:  tdb ps   (shares the host TIPC namespace).
# Tear-down:  Ctrl-C, then `docker compose -f deploy/docker-compose.yml down`.
#
# NOTE: the supervisor dropped etcd — live state flows over the TIPC
# NodeEdge/NodeState firehose, not etcd. No etcd endpoint/lib mounts here.

services:

  central:
    image: theia-central:latest
    build:
      context: .                       # deploy/
      dockerfile: central/Dockerfile
    container_name: theia-central
    network_mode: host
    volumes:
      # Logs persist to ./logs/ for inspection after teardown. Everything else
      # under /opt/theia is provisioned from outside, not mounted.
      - ./logs/central:/var/log/theia
    environment:
      - HOSTNAME=central
      - TZ=UTC
    restart: unless-stopped

  compute:
    image: theia-compute:latest
    build:
      context: .
      dockerfile: compute/Dockerfile
    container_name: theia-compute
    network_mode: host
    volumes:
      - ./logs/compute:/var/log/theia
    environment:
      - HOSTNAME=compute
      - TZ=UTC
      # Avoid a :7700 collision with central's com bridge on the shared host
      # network (com is currently hidden from the build; harmless either way).
      - THEIA_COM_LISTEN=0.0.0.0:7701
    restart: unless-stopped
