# deploy/docker-compose.yml — two-host Theia bringup in Docker.
#
# Topology (matches demo/manifest/zonal_rig.py::DemoSoftware):
#
#   central — services (the FC daemons) + gateway, exposes gRPC on host:7700.
#   compute — demo binaries, exposes gRPC on host:7701.
#
# Both containers share a bridge network so gRPC + TIPC traffic crosses
# cleanly. The artheia rig manifest's machines.json records the gRPC
# endpoints; a GUI / tdb client on the host connects to both.
#
# Pre-flight (run from workspace root, venv on PATH):
#
#   export PATH="$PWD/.venv/bin:$PATH"
#
#   # 1. Build the per-machine .ipks + the supervisor binary via Bazel.
#   theia dist                       # bazel build the @rig_zonal bundles
#   bazel build //platform/supervisor/main:supervisor
#
#   # 2. Stage artifacts into deploy/.staging/ (compose's bind-mount source).
#   ./deploy/stage.sh                # see deploy/stage.sh
#
#   # 3. Build the base + per-host images, then bring it up.
#   docker compose -f deploy/docker-compose.yml build
#   docker compose -f deploy/docker-compose.yml up
#
#   # 4. Inside each container the entrypoint runs `theia provision` then
#   #    `theia orchestrate` (Puppet phase 1 + 2) before exec'ing the
#   #    supervisor. Drive it from the host with tdb.
#
# Tear-down:  Ctrl-C, then `docker compose -f deploy/docker-compose.yml down`.
#
# NOTE: the supervisor dropped etcd — live state flows over the TIPC
# NodeEdge/NodeState firehose, not etcd. No etcd endpoint/lib mounts here.

services:

  central:
    image: theia-central:latest
    build:
      context: .                       # deploy/
      dockerfile: central/Dockerfile
    container_name: theia-central
    hostname: central
    networks:
      theia_net:
        aliases: [central, central_host]
    ports:
      - "7700:7700"     # supervisor → host: services/com gRPC bridge
    volumes:
      # Per-machine .ipk + executor.json + machines.json Bazel emits via
      # @rig_zonal//:all. stage.sh copies them into
      # deploy/.staging/<machine_name>/ipk/ where <machine_name> matches the
      # rig MachineManifest.name (`central_host`, `compute_host`).
      - ./.staging/central_host/ipk:/opt/theia/ipk:ro
      # Puppet manifests (central.pp) + the shared theia module.
      - ./puppet:/etc/puppet:ro
      # Supervisor binary (bazel gen-app FC //platform/supervisor/main:supervisor).
      # Until packaged in the .ipk, bind-mount it directly, read-only.
      - ../bazel-bin/platform/supervisor/main/supervisor:/usr/bin/theia-supervisor:ro
      # Logs persist to ./logs/ for inspection after teardown.
      - ./logs/central:/var/log/theia
    environment:
      - HOSTNAME=central
      - TZ=UTC
    restart: unless-stopped

  compute:
    image: theia-compute:latest
    build:
      context: .
      dockerfile: compute/Dockerfile
    container_name: theia-compute
    hostname: compute
    networks:
      theia_net:
        aliases: [compute, compute_host]
    ports:
      # services-com listens on its hardcoded default 0.0.0.0:7700 inside
      # the container; host-side we map that to 7701 so it doesn't clash
      # with central's 7700 publish.
      - "7701:7700"
    volumes:
      - ./.staging/compute_host/ipk:/opt/theia/ipk:ro
      - ./puppet:/etc/puppet:ro
      - ../bazel-bin/platform/supervisor/main/supervisor:/usr/bin/theia-supervisor:ro
      - ./logs/compute:/var/log/theia
    environment:
      - HOSTNAME=compute
      - TZ=UTC
    restart: unless-stopped
    # compute can't start until central is up — the gateway lives on
    # central and the demo's TIPC clients dial central via the bridge.
    depends_on:
      - central

networks:
  theia_net:
    driver: bridge
    # Static subnet so the artheia machines.json addresses are stable
    # across `compose down/up` cycles.
    ipam:
      config:
        - subnet: 172.30.0.0/24
