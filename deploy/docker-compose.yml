# deploy/docker-compose.yml — two-host Theia bringup in Docker (host network).
#
# Topology (matches apps/manifest/test_rig.py::DemoSoftware — all-x86 docker):
#
#   central — services (the FC daemons) + gateway.
#   compute — demo binaries.
#
# Both services run on `network_mode: host` so they share the HOST network AND
# the host TIPC namespace — the supervisor + FC nodes bind to localhost, and a
# host-side `tdb` (TIPC via artheia.probe) can reach the containerized
# supervisor directly.
#
# These containers DO NOT self-provision. They start EMPTY (/opt/theia/{bin,
# config} are empty dirs from the image) and the entrypoint loops with a
# "waiting for orchestration" message until provisioning has been pushed in
# FROM OUTSIDE — an operator / CI runs `theia provision` + `theia orchestrate`
# (puppet) against the container, which lays down /opt/theia/bin/supervisor +
# /opt/theia/config/executor.json. The entrypoint then runs the supervisor.
# On `docker compose down` the container is destroyed → back to empty; a fresh
# `up` waits again until re-provisioned. (No persistent volume by design.)
#
# Pre-flight (from workspace root, venv on PATH):
#
#   export PATH="$PWD/.venv/bin:$PATH"
#   docker compose -f deploy/docker-compose.yml build
#   docker compose -f deploy/docker-compose.yml up          # waits for orchestration
#   # then, from the host, provision + orchestrate each machine into its container
#
# Drive it from the host:  tdb ps   (shares the host TIPC namespace).
# Tear-down:  Ctrl-C, then `docker compose -f deploy/docker-compose.yml down`.
#
# NOTE: the supervisor dropped etcd — live state flows over the TIPC
# NodeEdge/NodeState firehose, not etcd. No etcd endpoint/lib mounts here.

services:

  # etcd — ONE per cluster (central's machine.json declares it). Behind the
  # `etcd` profile because in a dev box the HOST already runs etcd on
  # 127.0.0.1:2379 (and under network_mode: host a second one would collide on
  # :2380). Bring it up only on a clean machine with no host etcd:
  #     docker compose --profile etcd up
  # Either way central treats etcd as externally provided (FACTER_theia_etcd_
  # external) and connects at 127.0.0.1:2379 (machine.json etcd_endpoint).
  etcd:
    image: quay.io/coreos/etcd:v3.5.12
    container_name: theia-etcd
    profiles: ["etcd"]
    network_mode: host
    command:
      - /usr/local/bin/etcd
      - --name=theia0
      - --data-dir=/var/lib/theia-etcd
      - --listen-client-urls=http://127.0.0.1:2379
      - --advertise-client-urls=http://127.0.0.1:2379
      - --listen-peer-urls=http://127.0.0.1:2380
      - --initial-advertise-peer-urls=http://127.0.0.1:2380
      - --initial-cluster=theia0=http://127.0.0.1:2380
      - --initial-cluster-state=new
      - --initial-cluster-token=theia-etcd-token
    volumes:
      - ./logs/etcd:/var/lib/theia-etcd
    restart: unless-stopped

  central:
    image: theia-central:latest
    build:
      context: .                       # deploy/
      dockerfile: central/Dockerfile
    container_name: theia-central
    network_mode: host
    # Capabilities the Theia binaries hold (the setcap contract in
    # theia::postinstall, applied at provisioning). cap_add raises the
    # container's bounding/ambient set so the file caps (+eip) actually take on
    # exec; without it setcap'd binaries silently run uncapped under Docker's
    # default cap drop:
    #   SYS_NICE — supervisor: realtime sched (SCHED_FIFO/RR) + CPU affinity on
    #              the FC node threads, raised into ambient so forked children
    #              inherit it.
    #   NET_RAW + NET_ADMIN — gateway: AF_PACKET / raw CAN+UDP for ASAM-CMP
    #              capture (gateway is dropped from the build today; kept here
    #              so it works the moment it's re-added).
    cap_add:
      - SYS_NICE
      - NET_RAW
      - NET_ADMIN
    volumes:
      # Puppet drives provisioning/orchestration in-container (run-supervisor.sh).
      # It needs: the puppet module tree + site manifests, the per-machine JSON
      # manifests, and the built .ipk bundles. All read-only — puppet copies out
      # of them into /opt/theia.
      - ./puppet:/etc/puppet:ro
      - ../dist/manifest:/etc/theia/manifest:ro
      - ../bazel-bin/dist/manifest:/opt/theia/ipk:ro
      - ./logs/central:/var/log/theia
    environment:
      - HOSTNAME=central
      - TZ=UTC
      # etcd is provided by the compose `etcd` service (not apt-installed into
      # this minimal container); provisioning reads FACTER_theia_etcd_external and
      # skips the in-image etcd install while honouring machine.json's etcd decl.
      - FACTER_theia_etcd_external=1
    restart: unless-stopped

  compute:
    image: theia-compute:latest
    build:
      context: .
      dockerfile: compute/Dockerfile
    container_name: theia-compute
    network_mode: host
    # Same cap contract as central (see its comment) — supervisor needs
    # SYS_NICE; NET_RAW/NET_ADMIN for the gateway when re-added.
    cap_add:
      - SYS_NICE
      - NET_RAW
      - NET_ADMIN
    volumes:
      # Same puppet-driven provisioning inputs as central (compute has no etcd).
      - ./puppet:/etc/puppet:ro
      - ../dist/manifest:/etc/theia/manifest:ro
      - ../bazel-bin/dist/manifest:/opt/theia/ipk:ro
      - ./logs/compute:/var/log/theia
    environment:
      - HOSTNAME=compute
      - TZ=UTC
      # Avoid a :7700 collision with central's com bridge on the shared host
      # network (com is currently hidden from the build; harmless either way).
      - THEIA_COM_LISTEN=0.0.0.0:7701
      # compute's supervisor binds TIPC instance 1 (central's is 0) so the two
      # don't collide on the shared host TIPC namespace. The instance is NOT set
      # here — run-supervisor.sh reads it from the manifest
      # (<machine>/execution.json.supervisor_instance, set by the rig's
      # SoftwareSpecification.supervisor). Manifest-driven, no hardcoded env.
    restart: unless-stopped
