# Static traefik file-provider routes for the OSS mender-server, mapping the API
# paths to the service containers directly. up.sh copies this into the cloned
# server's compose/config/traefik/ (which traefik loads via
# --providers.file.directory). This makes routing independent of the broken
# Docker-label discovery (see docker-compose.override.yml for why).
#
# Both surfaces are covered:
#   /api/management/...  the FLEET side  (fleet.py: upload artifacts, deploy)
#   /api/devices/...     the DEVICE side (the rig's mender client: auth, pull)
http:
  routers:
    deploymentsMgmt:
      rule: "PathPrefix(`/api/management/v1/deployments`) || PathPrefix(`/api/management/v2/deployments`)"
      service: deployments
      entryPoints: [websecure]
      tls: {}
    deploymentsDL:
      rule: "PathPrefix(`/api/devices/v1/deployments`) || PathPrefix(`/api/devices/v2/deployments`)"
      service: deployments
      entryPoints: [websecure]
      tls: {}
    deviceauthMgmt:
      rule: "PathPrefix(`/api/management/v1/devauth`) || PathPrefix(`/api/management/v2/devauth`)"
      service: deviceauth
      entryPoints: [websecure]
      tls: {}
    deviceauthDev:
      rule: "PathPrefix(`/api/devices/v1/authentication`)"
      service: deviceauth
      entryPoints: [websecure]
      tls: {}
    inventoryMgmt:
      rule: "PathPrefix(`/api/management/v1/inventory`)"
      service: inventory
      entryPoints: [websecure]
      tls: {}
    inventoryDev:
      rule: "PathPrefix(`/api/devices/v1/inventory`)"
      service: inventory
      entryPoints: [websecure]
      tls: {}
    useradmMgmt:
      rule: "PathPrefix(`/api/management/v1/useradm`)"
      service: useradm
      entryPoints: [websecure]
      tls: {}
    gui:
      rule: "PathPrefix(`/`)"
      service: gui
      entryPoints: [websecure]
      priority: 1
      tls: {}
  services:
    deployments:
      loadBalancer:
        servers:
          - url: "http://deployments:8080"
    deviceauth:
      loadBalancer:
        servers:
          - url: "http://deviceauth:8080"
    inventory:
      loadBalancer:
        servers:
          - url: "http://inventory:8080"
    useradm:
      loadBalancer:
        servers:
          - url: "http://useradm:8080"
    gui:
      loadBalancer:
        servers:
          - url: "http://gui:8090"
