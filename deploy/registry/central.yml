# Deploy-target registry entry — `central` (the L4-B GATEWAY board).
#
# The rpi4 ('raspberrypi' @ 10.0.0.22) — the robot's Gateway ECU + the ONE Mender
# device-of-record. It runs the full services_rig slice (dist/manifest/central/)
# and is the cluster's etcd singleton: L4-B SHARED ETCD lives here, bound on
# 0.0.0.0:2379 so the compute board's per (deploy/config/jetson/per.json →
# etcd_endpoint 10.0.0.22:2379) reaches it. V-UCM (central) aggregates every
# board's PROVISIONAL marker (ucm_activation_<board>) from this one keyspace.
#
# L4-B role: mender_role gateway → mender-agent + gateway + proxy + V-UCM enabled
# (the cloud-facing identity; the compute board reaches the server via this
# board's proxy, never directly). See docs/tasks/BACKLOG/L4B-multiboard-vucm.md.

ansible_host: 10.0.0.22
ansible_user: axadmin
machine: central
arch: aarch64
deb_arch: arm64

# Runtime plane (S3): pull the bookworm-arm64 runtime+services (the rpi4 ABI —
# DIFFERENT glibc than the compute board's focal-arm64). Seeded by seed-official.sh.
runtime_version: 0.2.4-bookworm-arm64
s3_endpoint: http://10.0.0.99:9000
s3_runtime_bucket: theia-runtime

# This board IS the etcd singleton (colony etcd.yml installs + configures it here).
# Bind 0.0.0.0 + advertise the eth IP so the compute board's per can reach it.
etcd_listen_host: 0.0.0.0
etcd_advertise_host: 10.0.0.22

# ── L4-B multi-board role ────────────────────────────────────────────────────
mender_role: gateway
# This board IS the gateway ECU — enrol it as theia-gateway so the gateway app
# artifact (compatible-devices: [theia-gateway]) targets it via the GS app plane,
# and the central/compute role artifacts (theia-rig) never land here by mistake.
mender_device_type: theia-gateway
# The boards this vehicle's V-UCM campaigns fan out to (the campaign roster). Set
# into VucmConfig.boards so CMP_CONFIRMING waits for ALL before the aggregate
# Confirm. Pushed via deploy/config/central/vucm.json.
boards: "central,compute"

# L4-B: cluster-scope TIPC binds so the compute board reaches central singletons.
tipc_scope: cluster

# L4-B: the cross-board TIPC eth bearer. The link is only DISCOVERED once the
# bearer is enabled on BOTH ends — compute carries tipc_bearer too. Without it
# here, central publishes at cluster scope but never brings up the eth bearer, so
# compute's UCM → central's per (and V-UCM reading a remote marker) silently fail
# even though the scope is right. (Single-board rpi4 targets omit this — no peer.)
tipc_bearer: eth0

# Per-machine TIPC instance index (central=0; from machines.json order). The
# supervisor shifts each child node's --tipc instance by this, so the same FC
# binary binds a DISTINCT cluster address per board (ucm_daemon 0x8001000E:0 here,
# :1 on compute) — V-UCM reaches a SPECIFIC board's UCM via connect_instance(idx).
machine_instance: 0
