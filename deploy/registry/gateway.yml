# Deploy-target registry entry — `gateway` (the rpi4, STANDALONE gateway ECU).
#
# The rpi4 ('raspberrypi' @ 10.0.0.22) as a SELF-CONTAINED gateway: the robot's
# Gateway ECU + Mender device-of-record (theia-gateway), running the full single-
# node services rig (machine `central` = every FC) PLUS the gateway data-path app
# (gateway-1.0, delivered over Mender). It is its OWN etcd singleton and a single
# board — NO cross-board TIPC / no compute-coordinator roster.
#
# Supersedes central.yml (the L4-B central that coordinated the Jetson compute
# board). The Jetson is now its own standalone rig (jason.yml), so the rpi4 drops
# the multi-board bits (boards roster, cluster TIPC scope, eth bearer).

ansible_host: 10.0.0.22
ansible_user: axadmin
machine: central
arch: aarch64
deb_arch: arm64

# Runtime plane (S3): the bookworm-arm64 runtime+services (the rpi4 ABI).
runtime_version: 0.2.4-bookworm-arm64
s3_endpoint: http://10.0.0.99:9000
s3_runtime_bucket: theia-runtime

# Its OWN etcd singleton (single board — bind localhost; only its own per/V-UCM
# read it, no peer board).
etcd_listen_host: 0.0.0.0
etcd_advertise_host: 10.0.0.22

# ── Mender identity: the gateway device-of-record ────────────────────────────
mender_role: gateway
mender_device_type: theia-gateway
# Single-board V-UCM roster — just this board.
boards: "central"

# ── Single-board TIPC: node scope, instance 0, NO cross-board bearer ─────────
# (Contrast the old central.yml, which carried tipc_bearer eth0 + cluster scope
# to reach the Jetson compute board over TIPC.)
tipc_scope: node
machine_instance: 0
