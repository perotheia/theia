# Deploy-target registry entry — `jason` (the Jetson AGX, STANDALONE single node).
#
# The Jetson AGX Orin ('jason' @ 10.0.0.67, focal/glibc 2.31) provisioned as a
# SELF-CONTAINED single-board rig — NOT the compute half of a central/compute
# pair. It runs the FULL services rig (the `jetson` manifest slice = every FC:
# com/sm/phm/per/vucm/ucm/crypto/nm/tsync/log/…), is its OWN etcd singleton, and
# is the Mender device-of-record (direct, no central proxy). No cross-board TIPC.
#
# This frees the rpi4 to become the gateway. The compute.yml entry (Jetson as a
# central-dependent agent) is superseded by this — DON'T provision both.

ansible_host: 10.0.0.67
ansible_user: nvidia
# Use the FULL single-node manifest slice (dist/manifest/jetson/ — machine.json
# name 'central', the whole-rig supervisor tree). The manifest is arch-agnostic;
# only the runtime .deb below differs by ABI.
machine: jetson
arch: aarch64
deb_arch: arm64

# Runtime plane (S3): the focal-arm64 runtime (Jetson's glibc 2.31 ABI — DIFFERENT
# from the rpi4's bookworm). Reuses the already-published key (no recompile).
runtime_version: 0.2.1-focal-arm64
s3_endpoint: http://10.0.0.99:9000
s3_runtime_bucket: theia-runtime

# ── Standalone: its OWN etcd singleton ───────────────────────────────────────
# As a single node it hosts its own etcd (colony etcd.yml installs + starts it
# here). Bind localhost — no peer board reads this keyspace, so no 0.0.0.0 expose
# is needed (its own per + V-UCM are the only clients).
etcd_listen_host: 0.0.0.0
etcd_advertise_host: 10.0.0.67

# ── Mender identity: standalone device-of-record ─────────────────────────────
# A self-contained rig → device_type theia-rig (the role/runtime artifacts target
# it). Direct Mender (no central proxy — there is no central). V-UCM here runs the
# campaign for THIS board only.
mender_role: gateway
mender_device_type: theia-rig
# This board's V-UCM roster is just itself (single-board campaign).
boards: "jetson"

# ── Single-board TIPC: NO cross-board bearer / no cluster peer ───────────────
# It's alone — bind at node (default) scope, bring up no eth bearer, address its
# own UCM at instance 0. (Contrast compute.yml, which carried tipc_bearer +
# tipc_central_host to reach the rpi4's singletons.)
tipc_scope: node
machine_instance: 0
