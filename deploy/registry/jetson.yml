# Deploy-target registry entry — `jetson` (the L4-B COMPUTE board).
#
# The Jetson AGX Orin ('jason', focal / glibc 2.31, aarch64). It runs the SAME
# full 16-FC services_rig slice as a central (dist/manifest/jetson/, serialized
# --arch aarch64) — the user's "full system-rig on every board; Mender overrides
# central+compute with the user manifest" model. colony provisions it from the
# focal-arm64 runtime plane in S3 (a DIFFERENT glibc ABI than the rpi4
# bookworm-arm64 central — hence the abi-qualified runtime_version below).
#
# L4-B role split: this board is a Mender AGENT (UCM) — it reaches the Mender
# server only via the CENTRAL board's mender-PROXY, never the cloud directly. The
# central (rpi4) is the Mender device-of-record (Gateway + Proxy + V-UCM); this
# compute board's UCM escalates its activation marker to the central's V-UCM over
# TIPC. See docs/tasks/BACKLOG/L4B-multiboard-vucm.md.

ansible_host: 10.0.0.67
ansible_user: nvidia
# The artheia machine slice to push: dist/manifest/jetson/ (16-FC services_rig,
# arch aarch64). The S3 path (runtime_version set) supplies the binaries; this
# slice supplies executor.json + per-FC config.
machine: jetson
arch: aarch64
deb_arch: arm64

# ── Runtime plane (S3) ───────────────────────────────────────────────────────
# Pull the focal-arm64 runtime+services .debs from the MinIO runtime plane. The
# abi_key suffix keeps the focal deb from colliding with the rpi4 bookworm-arm64
# runtime (0.2.1) — they are NON-interchangeable glibc. seed-official.sh wrote
# s3://theia-runtime/0.2.1-focal-arm64/{index.json,*.deb}.
runtime_version: 0.2.1-focal-arm64
s3_endpoint: http://10.0.0.99:9000
s3_runtime_bucket: theia-runtime

# ── L4-B multi-board role ────────────────────────────────────────────────────
# This board runs a Mender AGENT (no direct cloud); the central board proxies it.
mender_role: agent
# The central board (Mender device-of-record + proxy + V-UCM) this compute board
# escalates to. mender-agent points its ServerURL at the proxy; UCM's activation
# marker fans up to the central's V-UCM over TIPC.
mender_proxy_host: 10.0.0.22
# TIPC bearer to the central's cluster (so this board's FCs join the same TIPC
# nameseq fabric as the central — one rig = one TIPC cluster).
tipc_bearer: eth0
tipc_central_host: 10.0.0.22
