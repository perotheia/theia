// services/com gRPC bridge.
//
// External operators (supervisor-gui, dashboards, fleet manager) speak
// gRPC; the supervisor on each machine speaks TIPC. This service is
// the translation layer hosted on each machine; one gRPC server per
// machine (one per Machine in the artheia rig).
//
// Reuses the supervisor's existing message types verbatim — no
// translation/redefinition. ChildState, SupervisionEvent, etc. come
// from platform/supervisor/system/package.art via the same protoc
// pipeline; we just import them with relative paths the gRPC plugin
// can find.

syntax = "proto3";

package services.com;

import "ChildState.proto";
import "ChildSpec.proto";
import "ChildSelector.proto";
import "ControlReply.proto";
import "HealthBeacon.proto";
import "SupervisionEvent.proto";
import "TreeSnapshot.proto";

// One streamed observation from the supervisor. Discriminated union
// — exactly one of the three fields is populated per message.
message SupervisorObservation {
    oneof kind {
        services.supervisor.SupervisionEvent event    = 1;
        services.supervisor.HealthBeacon     health   = 2;
        services.supervisor.TreeSnapshot     snapshot = 3;
    }
}

// Empty subscribe request — observers attach blindly. Future extensions
// could carry a filter (e.g. "only events kind=X") but the current GUI
// wants the whole firehose.
message SubscribeRequest {}

// Unary RPC carriers. Each wraps a supervisor-side request.
message StartChildCall  { services.supervisor.ChildSpec     spec = 1; }
message DeleteChildCall { string name = 1; }

// (target_node, level) log-level set. Routed via the supervisor (#385):
// supdbg → com → supervisor → node. The supervisor stores the level
// keyed by child NAME so it survives restart (overwrites the child's
// spawn env THEIA_LOG_LEVEL) and pushes a live LogLevelConfig frame to
// the node for no-restart application. `level` is one of
// trace|debug|info|warn|error (parse_log_level is lax on unknowns).
message LogLevelCall {
    string target_node = 1;
    string level        = 2;
}

// ---- Robot node: signal inject + service call (#387) -------------------
//
// com IS the robot node: a test impersonates a real node and drives
// another component over TIPC, speaking the standard GwMessageHeader
// wire shape every FC's runtime TipcMux already decodes — no bespoke
// frame. The test resolves the target's TIPC (type, instance) from its
// rig context and supplies them; com is stateless about topology.
//
// Encode is host-side: the test builds `payload` with the standard
// Python protobuf lib (SmRequest(...).SerializeToString()), wire-
// identical to nanopb on-target. `msg_type` is the nanopb C type name
// (e.g. "services_services_sm_SmRequest") so its djb2 service_id
// matches what the target node's register_cast/register_call computed.
// `src` is the impersonated sender name (trace attribution only;
// routing is by the held socket, like real port→node routing).

message InjectSignalCall {
    uint32 tipc_type     = 1;   // target node TIPC name: type
    uint32 tipc_instance = 2;   //                        instance
    string msg_type      = 3;   // nanopb C type name (djb2 → service_id)
    bytes  payload       = 4;   // proto3-wire bytes (built host-side)
    string src           = 5;   // impersonated sender (trace only)
}

// Async cast — fire-and-forget GW_MSG_GEN_CAST. Ack just reports
// whether com sent the frame (no component-level confirmation).
message InjectSignalAck {
    bool   sent    = 1;
    string message = 2;
}

message CallServiceCall {
    uint32 tipc_type     = 1;
    uint32 tipc_instance = 2;
    string req_msg_type  = 3;   // request nanopb C type name (→ service_id)
    bytes  payload       = 4;   // request proto3-wire bytes
    string src           = 5;
    uint32 timeout_ms    = 6;   // 0 → com default
}

// Sync call reply — GW_MSG_GEN_CALL_REPLY payload returned to the test.
message CallServiceReply {
    bool   ok      = 1;         // false on timeout / send failure
    string message = 2;         // error detail when !ok
    bytes  payload = 3;         // reply proto3-wire bytes (test decodes)
}

service SupervisorView {
    // Server-streaming firehose of every observation the supervisor
    // emits over its TIPC events port. Clients open one of these per
    // machine and dispatch by oneof kind.
    rpc Subscribe(SubscribeRequest) returns (stream SupervisorObservation);

    // Unary mutators — directly mirror OTP supervisor's child API.
    rpc StartChild     (StartChildCall)
        returns (services.supervisor.ControlReply);
    rpc DeleteChild    (DeleteChildCall)
        returns (services.supervisor.ControlReply);
    rpc RestartChild   (services.supervisor.ChildSelector)
        returns (services.supervisor.ControlReply);
    rpc TerminateChild (services.supervisor.ChildSelector)
        returns (services.supervisor.ControlReply);

    // Set a child's runtime log level (#385). Routes through the
    // supervisor (op_kind=11) which persists it across restart and
    // pushes it live to the node. Mirrors TraceStream.Configure.
    rpc ConfigureLogLevel (LogLevelCall)
        returns (services.supervisor.ControlReply);

    // ---- Robot node (#387) -------------------------------------------
    // Test-only: inject a signal / call a service ON a component,
    // impersonating a node. com connects directly to the target's TIPC
    // name and speaks GW_MSG_GEN_CAST / GW_MSG_GEN_CALL. Compiled out of
    // release builds via THEIA_ROBOT_NODE (see CMakeLists / BUILD).
    rpc InjectSignal (InjectSignalCall) returns (InjectSignalAck);
    rpc CallService  (CallServiceCall)  returns (CallServiceReply);
}


// ---------------------------------------------------------------------------
// TraceStream (#354) — gRPC bridge for services/log[trace] over TIPC.
//
// Wire shape is mirrored from the .art-driven log.proto (nanopb on the
// node side, plain protobuf here). We re-declare the messages instead
// of importing log.proto because that file is compiled by nanopb_generator
// at build time and the .pb.h doesn't carry the C++ libprotobuf symbols
// services/com's protoc pipeline needs. The byte-level wire format is
// identical — both stacks read the same field numbers.
// ---------------------------------------------------------------------------

// One trace record observed at the log[trace] fanout. Mirrors the
// services_services_log_TraceRecord nanopb struct produced by the FC
// runtime (platform/runtime/include/Tracer.hh emits it).
message TraceRecord {
    string node_name = 1;   // emitting node (e.g. "SmDaemon")
    string msg_type  = 2;   // proto message type name (e.g. "SmStateMsg")
    uint32 corr_id   = 3;   // pairs Send/Recv/Dispatch within one cast/call
    uint64 ts_ns     = 4;   // emitting node's steady_clock ns
    bytes  payload   = 5;   // proto-wire-v3 bytes — fed to libtrace_decoder
}

// (target_node, msg_type) filter toggle. Routed via the supervisor's
// NodeTraceCtl push path (#361): supdbg/GUI → com → supervisor → node.
// `enabled=true`  installs the filter and starts flow; the supervisor
//                 remembers it so it survives child restarts (#353).
// `enabled=false` removes the filter; records stop flowing for that
//                 (node, msg_type) pair.
message TraceConfigRequest {
    string target_node = 1;
    string msg_type    = 2;
    bool   enabled     = 3;
}

// gRPC carrier for the per-stream subscribe call. Currently empty —
// subscription is "all trace records flowing through the collector"
// and per-(node, msg_type) selection is via Configure, not the
// subscription itself. This matches the dbg-style flow from the
// Robot spec (services/log/trace_collection.robot).
message TraceSubscribeRequest {}

service TraceStream {
    // Server-streaming firehose of TraceRecord wired from the log[trace]
    // collector's TIPC fanout. Clients open one of these per machine and
    // read until they Configure(enabled=false) or close the stream.
    rpc Subscribe(TraceSubscribeRequest) returns (stream TraceRecord);

    // Configure (node, msg_type) filter. Routes through the supervisor
    // so the config persists across child restart — see #361 for the
    // server side.
    rpc Configure(TraceConfigRequest)
        returns (services.supervisor.ControlReply);
}
