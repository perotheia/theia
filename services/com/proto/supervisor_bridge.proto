// services/com gRPC bridge.
//
// External operators (supervisor-gui, dashboards, fleet manager) speak
// gRPC; the supervisor on each machine speaks TIPC. This service is
// the translation layer hosted on each machine; one gRPC server per
// machine (one per Machine in the artheia rig).
//
// Reuses the supervisor's existing message types verbatim — no
// translation/redefinition. ChildState, SupervisionEvent, etc. come
// from platform/supervisor/system/package.art via the same protoc
// pipeline; we just import them with relative paths the gRPC plugin
// can find.

syntax = "proto3";

package services.com;

// Reuse the consolidated supervisor proto (package system_supervisor).
import "supervisor.proto";


// SHWA hardware-telemetry sample — mirrors services/shwa AccelSample
// (system/services/shwa/package.art) field-for-field. com receives the nanopb
// AccelSample over TIPC (SHWA's AccelTelemetry egress) and re-emits it as an
// `accel` arm of the firehose so the GUI's GPU / host panels fill from one
// stream. proto3 (libprotobuf gRPC edge); wire-identical to the nanopb side.
message AccelSample {
    string board                 = 1;
    bool   on_jetson             = 2;
    uint32 power_mode            = 3;   // services_shwa PowerMode ordinal
    uint32 cpu_util_pct          = 4;
    uint32 cpu_count             = 5;
    uint32 cpu_freq_mhz          = 6;
    uint32 gpu_util_pct          = 7;
    uint32 gpu_freq_mhz          = 8;
    uint32 mem_used_mb           = 9;
    uint32 mem_total_mb          = 10;
    uint32 temp_c                = 11;
    uint32 power_mw              = 12;
    uint32 fan_rpm               = 13;
    uint64 uptime_sec            = 14;
    uint64 disk_root_total_kb    = 15;
    uint64 disk_root_avail_kb    = 16;
    uint64 disk_install_total_kb = 17;
    uint64 disk_install_avail_kb = 18;
    uint64 ts_ns                 = 19;
    // Cluster identity (mirror of shwa.proto). shwa stamps machine_index from
    // its resolved TIPC instance; com fills machine_name from the machine
    // manifest. The GUI Load panel labels per-machine HW from these.
    uint32 machine_index         = 20;
    string machine_name          = 21;
}

// One streamed observation from the supervisor. Discriminated union
// — exactly one of the four fields is populated per message.
message SupervisorObservation {
    oneof kind {
        system_supervisor.SupervisionEvent event    = 1;
        system_supervisor.HealthBeacon     health   = 2;
        system_supervisor.TreeSnapshot     snapshot = 3;
        // SHWA hardware telemetry (GPU / host monitor), folded into the same
        // Subscribe stream and gated at com on a connected gRPC subscriber.
        AccelSample                        accel    = 4;
    }
}

// Empty subscribe request — observers attach blindly. Future extensions
// could carry a filter (e.g. "only events kind=X") but the current GUI
// wants the whole firehose.
message SubscribeRequest {}

// Unary RPC carriers. Each wraps a supervisor-side request.
message StartChildCall  { system_supervisor.ChildSpec     spec = 1; }
message DeleteChildCall { string name = 1; }

// (target_node, level) log-level set. Routed via the supervisor (#385):
// tdb → com → supervisor → node. The supervisor stores the level
// keyed by child NAME so it survives restart (overwrites the child's
// spawn env THEIA_LOG_LEVEL) and pushes a live LogLevelConfig frame to
// the node for no-restart application. `level` is one of
// trace|debug|info|warn|error (parse_log_level is lax on unknowns).
message LogLevelCall {
    string target_node = 1;
    string level        = 2;
}

// Read back the supervisor's current trace config (crash-investigation
// read-back). Empty request — the supervisor returns ALL stored
// per-child trace entries as a TraceConfigList. The supervisor keeps
// this across child restarts and re-pushes it to a freshly-restarted
// child, so the read-back is the operator's view of "what tracing will
// be active on the next crash/restart".
message GetTraceConfigCall {}

// Read back host facts (GetSystemInfo) + the supervisor's per-child log-level
// config (GetLogLevelConfig). Both empty requests — the supervisor returns the
// full SystemInfo / LogLevelConfigList. These back rtdb's `supervisor`/`info`
// and no-arg `loglevel` verbs (the SAME supervisor calls tdb's probe makes).
message GetSystemInfoCall {}
message GetLogLevelConfigCall {}

// Fetch a crashed child's tombstone (the libtombstone TEXT forensics file:
// signal/fault + backtrace + maps). Backs the GUI "Download tombstone" menu
// item, gated on the child's CORE_DUMPED flag. com forwards `child_name` to
// the supervisor's GetTombstone TIPC op and re-exposes the reply here as a
// native gRPC bytes payload (the GUI never sees the supervisor proto).
message GetTombstoneCall {
    string child_name = 1;
}

// The tombstone content, capped at the source (under the TIPC reply limit).
// When `truncated`, `path` is the on-host path of the FULL file so an operator
// can read the rest at the source. `found` is false when the child has no
// tombstone (never crashed, or it was reaped).
message GetTombstoneReply {
    bool   found       = 1;
    string path        = 2;   // on-host path of the full tombstone file
    bool   truncated   = 3;   // content is shorter than total_bytes
    uint32 total_bytes = 4;   // full file size at the source
    bytes  content     = 5;   // the (capped) tombstone text
}

// ---- Robot node: signal inject + service call (#387) -------------------
//
// com IS the robot node: a test impersonates a real node and drives
// another component over TIPC, speaking the standard GwMessageHeader
// wire shape every FC's runtime TipcMux already decodes — no bespoke
// frame. The test resolves the target's TIPC (type, instance) from its
// rig context and supplies them; com is stateless about topology.
//
// Encode is host-side: the test builds `payload` with the standard
// Python protobuf lib (SmRequest(...).SerializeToString()), wire-
// identical to nanopb on-target. `msg_type` is the nanopb C type name
// (e.g. "system_services_sm_SmRequest") so its djb2 service_id
// matches what the target node's register_cast/register_call computed.
// `src` is the impersonated sender name (trace attribution only;
// routing is by the held socket, like real port→node routing).

message InjectSignalCall {
    uint32 tipc_type     = 1;   // target node TIPC name: type
    uint32 tipc_instance = 2;   //                        instance
    string msg_type      = 3;   // nanopb C type name (djb2 → service_id)
    bytes  payload       = 4;   // proto3-wire bytes (built host-side)
    string src           = 5;   // impersonated sender (trace only)
}

// Async cast — fire-and-forget GW_MSG_GEN_CAST. Ack just reports
// whether com sent the frame (no component-level confirmation).
message InjectSignalAck {
    bool   sent    = 1;
    string message = 2;
}

message CallServiceCall {
    uint32 tipc_type     = 1;
    uint32 tipc_instance = 2;
    string req_msg_type  = 3;   // request nanopb C type name (→ service_id)
    bytes  payload       = 4;   // request proto3-wire bytes
    string src           = 5;
    uint32 timeout_ms    = 6;   // 0 → com default
}

// Sync call reply — GW_MSG_GEN_CALL_REPLY payload returned to the test.
message CallServiceReply {
    bool   ok      = 1;         // false on timeout / send failure
    string message = 2;         // error detail when !ok
    bytes  payload = 3;         // reply proto3-wire bytes (test decodes)
}

service SupervisorView {
    // Server-streaming firehose of every observation the supervisor
    // emits over its TIPC events port. Clients open one of these per
    // machine and dispatch by oneof kind.
    rpc Subscribe(SubscribeRequest) returns (stream SupervisorObservation);

    // Unary mutators — directly mirror OTP supervisor's child API.
    rpc StartChild     (StartChildCall)
        returns (system_supervisor.ControlReply);
    rpc DeleteChild    (DeleteChildCall)
        returns (system_supervisor.ControlReply);
    rpc RestartChild   (system_supervisor.ChildSelector)
        returns (system_supervisor.ControlReply);
    rpc TerminateChild (system_supervisor.ChildSelector)
        returns (system_supervisor.ControlReply);

    // Set a child's runtime log level (#385). Routes through the
    // supervisor (op_kind=11) which persists it across restart and
    // pushes it live to the node.
    rpc ConfigureLogLevel (LogLevelCall)
        returns (system_supervisor.ControlReply);

    // Configure trace for a node (the CONTROL/ingress path). Routes
    // through the supervisor (op_kind=9) which owns trace_config_[child]
    // and the per-NODE push (#361), so it survives restart. This is the
    // half that STAYS on com: rf → com → supervisor → node. The trace
    // EGRESS (reading records back) is served directly by the collector's
    // own TraceStream gRPC (services/log) — com is no longer in the byte
    // path for traces.
    rpc ConfigureTrace (TraceConfigRequest)
        returns (system_supervisor.ControlReply);

    // Read back the supervisor's stored trace config (op_kind=10). The
    // supervisor carries the TraceConfigList INLINE in
    // ControlReply.trace_config_list; com unpacks it and returns the
    // list. This is the crash-investigation read-back: confirm what
    // trace the supervisor will re-apply to a child after it restarts.
    rpc GetTraceConfig (GetTraceConfigCall)
        returns (system_supervisor.TraceConfigList);

    // Read-back: host facts (`rtdb supervisor` / `info`) + the supervisor's
    // per-child log-level config (`rtdb loglevel` with no level). Same
    // supervisor TIPC calls tdb's probe makes, surfaced over gRPC.
    rpc GetSystemInfo (GetSystemInfoCall)
        returns (system_supervisor.SystemInfo);
    rpc GetLogLevelConfig (GetLogLevelConfigCall)
        returns (system_supervisor.LogLevelConfigList);

    // Crash forensics: fetch a crashed child's tombstone bytes (capped).
    // Backs the GUI "Download tombstone" menu item on a CORE_DUMPED FC.
    rpc GetTombstone (GetTombstoneCall) returns (GetTombstoneReply);

    // ---- Robot node (#387) -------------------------------------------
    // Test-only: inject a signal / call a service ON a component,
    // impersonating a node. com connects directly to the target's TIPC
    // name and speaks GW_MSG_GEN_CAST / GW_MSG_GEN_CALL. Compiled out of
    // release builds via THEIA_ROBOT_NODE (see CMakeLists / BUILD).
    rpc InjectSignal (InjectSignalCall) returns (InjectSignalAck);
    rpc CallService  (CallServiceCall)  returns (CallServiceReply);
}


// ---------------------------------------------------------------------------
// Trace messages — the wire records + control request.
//
// TraceRecord / TraceConfigRequest STAY here (supervisor_bridge owns the
// record shape; the byte-level wire format mirrors the .art-driven
// log.proto — same field numbers, both stacks read the same bytes). The
// trace-egress SERVICE (TraceStream.Subscribe) moved OUT of com to the
// collector (services/log/proto/trace_stream.proto) — com no longer
// proxies trace records. ConfigureTrace (control) is on SupervisorView
// above; it routes through the supervisor and stays on com.
//
// We re-declare the messages here rather than import log.proto because
// that file is compiled by nanopb_generator and its .pb.h doesn't carry
// the C++ libprotobuf symbols com's protoc pipeline needs.
// ---------------------------------------------------------------------------

// One trace record observed at the log[trace] fanout. Mirrors the
// system_services_log_TraceRecord nanopb struct produced by the FC
// runtime (platform/runtime/include/Tracer.hh emits it).
//
// FIELD NUMBERS MUST TRACK log.proto EXACTLY — both stacks read the
// same bytes (see the boundary note above). Last synced 2026-05-26 with
// the src/dst/msg_id/kind header extension.
//
// `kind` is a plain uint32 here, NOT a redeclared enum: don't duplicate
// the enum decl across stacks. Proto enums varint-encode identically to
// uint32, so the wire is byte-compatible; com casts to/from the
// system_services_log_TraceKind value at the boundary. The .art-derived
// log.proto holds the single source-of-truth enum.
message TraceRecord {
    string node_name = 1;   // emitting node = src (e.g. "SmDaemon")
    string dst       = 2;   // destination/peer node, "" if none
    string msg_type  = 3;   // proto message type name (e.g. "SmStateMsg"); for
                            // a STATEM record this is the EVENT that fired it
    uint32 corr_id   = 4;   // = msg_id; pairs Send/Recv/Dispatch in a cast/call
    uint64 ts_ns     = 5;   // emitting node's steady_clock ns
    uint32 kind      = 6;   // TraceKind value (call/cast × in/out, statem)
    bytes  payload   = 7;   // proto-wire-v3 bytes — fed to libtrace_decoder
    string from_state = 8;  // STATEM only: the state left ("OFF"); "" otherwise
    string to_state   = 9;  // STATEM only: the state entered ("STARTING")
    string data_type  = 10; // STATEM only: flat type name of the `data` message
                            // in payload (e.g. "system_demo_DemoFsmData"), so a
                            // consumer decodes payload → a labelled data dict
}

// (target_node, msg_type, kind) filter toggle. Routed via the
// supervisor's NodeTraceCtl push path (#361): tdb/GUI → com →
// supervisor → node. `enabled=true` installs the filter and starts
// flow; the supervisor remembers it so it survives child restarts
// (#353). `enabled=false` removes the filter. `kind=0` means all kinds.
message TraceConfigRequest {
    string target_node = 1;
    string msg_type    = 2;
    bool   enabled     = 3;
    uint32 kind        = 4;   // TraceKind value; 0 = all kinds
}

// ---- Trace EGRESS — served by com's TraceForwarder runnable -------------
//
// Phase C: the trace gRPC moved INTO com (TraceForwarder), so com governs the
// DMZ for BOTH the trace byte path AND the control path. TraceForwarder
// subscribes to log[trace]'s TIPC TraceStream hub (TraceCtl.Subscribe at
// 0x80010014) and re-streams each record over this gRPC service. log[trace]
// stays a pure-TIPC hub (no gRPC of its own); the old
// services/log/proto/trace_stream.proto + its CMake daemon are retired.
//
// Per-stream subscribe request. Optional filters applied stream-side:
//   kind        — TraceKind value (call/cast × in/out, statem); 0 = all
//   target_node — restrict to one source node (component name); "" = all
// (Enabling/disabling a node's tracer is the separate CONTROL path,
// ConfigureTrace → supervisor → node; this filter is just stream selection.)
message TraceSubscribeRequest {
    uint32 kind        = 1;   // TraceKind value; 0 = all kinds
    string target_node = 2;   // component name; "" = all nodes
}

service TraceStream {
    // Server-streaming firehose of trace records. TraceForwarder subscribes
    // to the TIPC hub once and fans every record out to all gRPC subscribers.
    // Clients open one per machine and read until they close the stream.
    rpc Subscribe(TraceSubscribeRequest) returns (stream TraceRecord);
}


// ---- Log EGRESS — served by com's LogForwarder runnable ------------------
//
// The LOG analogue of TraceStream: LogForwarder subscribes to log[logging]'s
// TIPC LogDaemon hub (LogSubscribeReq at 0x80010003) and re-streams each log
// LINE over this gRPC service to rtdb logcat. The byte-level wire mirrors the
// .art-driven log.proto LogRecord (same field numbers) — both stacks read the
// same bytes, re-declared here for the libprotobuf gRPC edge (log.pb.h is
// nanopb-only). The fine <tag-glob>:<level> filter is applied client-side.
//
// FIELD NUMBERS MUST TRACK system.services.log.LogRecord EXACTLY.
//   level is a plain uint32 here (the log.proto LogLevel enum varint-encodes
//   identically) — the single source-of-truth enum lives in log.proto.
message LogRecord {
    string node  = 1;   // emitting FC node (= supervised worker name)
    string tag   = 2;   // the app/syslog tag the line carries
    uint32 level = 3;   // LogLevel value (0=VERBOSE … 5=FATAL)
    uint64 ts_ns = 4;   // wall time the line was emitted (epoch ns)
    string line  = 5;   // the verbatim message body (prefix already stripped)
}

// Per-stream subscribe request. Coarse filters applied stream-side; the fine
// <tag-glob>:<level> DSL is client-side (the hose stays dumb).
//   level_min  — drop lines below this LogLevel value (0 = keep all)
//   tag_filter — restrict to one tag; "" = all
message LogSubscribeRequest {
    uint32 level_min  = 1;
    string tag_filter = 2;
}

service LogStream {
    // Server-streaming firehose of log lines. LogForwarder subscribes to the
    // TIPC log hub once (spinning up the tailer) and fans every line out to all
    // gRPC subscribers; the last detach winds the tailer down.
    rpc Subscribe(LogSubscribeRequest) returns (stream LogRecord);
}


// ---- Persistency (services/per) proxy — served by ComGrpcProxy -----------
//
// com proxies services/per's MANAGER surface (the ops/tooling API on
// PerManager, TIPC 0x80010008) over gRPC so the GUI/rtdb can inspect the
// config store from outside the DMZ — WITHOUT a second etcd client (per is the
// sole etcd client; the GUI's direct etcd_panel is the raw mirror, this is the
// typed per view). ComDaemon's `to_per` PersistencyIf client reaches per; a
// PerLink (mirror of SupLink) RemoteRef-calls PerManager. Read/ops only:
// ListSchemas (the schema registry) + Snapshot (trigger a config backup). The
// config hot path (Get/Put/Watch) stays node↔per — it needs schema-aware
// decode the GUI can't do generically.
//
// These mirror system_services_per.{SchemaInfo,SchemaList,...} field-for-field
// (the bridge can't import per's proto package; PerLink re-encodes between the
// nanopb per structs and these libprotobuf messages).
message PerSchemaInfo {
    string config_type = 1;
    string digest      = 2;
}
message PerSchemaList {
    repeated PerSchemaInfo schemas = 1;
}
message ListSchemasCall {
    string config_type = 1;   // "" = all schemas
}
message SnapshotCall {
    string label = 1;         // tags the .persnap backup
}
message PerReply {
    uint32 status  = 1;       // 0 = OK
    string message = 2;
    uint64 mod_rev = 3;
}

// ---- GetSnapshot — read per's CURRENT decoded config store --------------
//
// Mirrors system_services_per.{GetStoreSnapshotReq,PerStoreRow,PerStoreSnapshot}
// field-for-field (PerLink re-encodes between the nanopb per structs and these
// libprotobuf messages). com proxies per's live store (the /theia/config/
// keyspace) so the GUI/rtdb can read it over com — NOT a second etcd client.
// The rows are RAW: `config` is the proto-wire bytes per stores, decoded by the
// CLIENT against the schema digest (same as tdb's decode_snapshot, server-side
// per never decodes the node's config type).
message GetSnapshotCall {
    string config_type = 1;   // "" = ALL rows; else just that type's row
}
message PerStoreRow {
    string config_type = 1;   // config owner node name (etcd key suffix)
    string digest      = 2;   // schema digest the bytes are encoded under
    bytes  config      = 3;   // serialized <Node>Config (client decodes)
}
message PerStoreSnapshot {
    repeated PerStoreRow rows = 1;
}

service PerView {
    // The schema registry — every (config_type, digest) per knows. Backs a
    // GUI "Persistency" panel + an `rtdb schemas` verb.
    rpc ListSchemas (ListSchemasCall) returns (PerSchemaList);
    // Trigger an operational snapshot of per's /theia/config/ keyspace to a
    // <snapshot_dir>/<label>.persnap backup file. Returns per's PerReply.
    rpc Snapshot (SnapshotCall) returns (PerReply);
    // Read per's CURRENT config store — the raw decoded rows of the
    // /theia/config/ keyspace (config_type="" = all). Backs the GUI
    // Persistency table + `rtdb snapshot`; the client decodes each row's
    // `config` bytes against the schema. Read-only, no etcd client needed.
    rpc GetSnapshot (GetSnapshotCall) returns (PerStoreSnapshot);
}

// ---- NmView — services/nm (Network Management) over com gRPC -------------
//
// com proxies nm's GetNetworkStatus (the readiness ladder) + WifiScan (the
// visible APs) so the GUI / rtdb get a wifi view without a TIPC client (tdb
// already has it over TIPC). Mirrors system_services_nm.{NmStatusMsg,WifiBss,
// WifiScanReply} field-for-field; NmLink re-encodes between the nanopb nm
// structs and these libprotobuf messages (the bridge can't import nm's package).
message NmStatus {
    uint32 state       = 1;   // NetState ordinal (0 OFF..6 OPERATIONAL, 3 DEGRADED)
    string interface   = 2;   // the monitored link
    bool   has_carrier = 3;
    bool   has_address = 4;
    bool   vpn_up      = 5;
    uint64 ts_ns       = 6;
}
message NmStatusCall { }      // GetNetworkStatus has no args

message NmWifiBss {
    string ssid       = 1;
    string bssid      = 2;
    int32  signal_dbm = 3;
    uint32 freq_mhz   = 4;
    string security   = 5;
}
message WifiScanCall {
    string interface = 1;     // "" = the first wireless interface nm monitors
}
message NmWifiScan {
    string interface    = 1;
    bool   associated   = 2;
    string assoc_ssid   = 3;
    string assoc_bssid  = 4;
    repeated NmWifiBss bss = 5;
}

service NmView {
    // The network-readiness snapshot (the ladder state + carrier/addr/vpn).
    rpc GetStatus (NmStatusCall) returns (NmStatus);
    // The visible AP list + association snapshot (`rtdb wifi`). Read-only `iw`.
    rpc WifiScan (WifiScanCall) returns (NmWifiScan);
}

// ---- Provisioning — rig enrollment over com (NOT SupervisorView) ----------
//
// The CENTRALIZED enrollment utility (colocated with Headscale in the cloud /
// on dalek) calls this over com gRPC (:7700) to provision a rig's identity +
// PKI — the theia-native analog of mosaic's `cloud_provision` (which used nested
// SSH; we use com). A separate service from SupervisorView because enrollment is
// a distinct fleet-management concern with its own authz, not a debug/control op.
//
// com writes the files on the rig under /etc/theia/manifest/<machine>/:
//   uuid, vin            (the rig identity)
//   certs/client.key     (the rig's private key — 0600)
//   certs/client.crt     (the rig's cert)
//   certs/server_ca.crt  (the fleet CA trust chain)
// These are the SAME paths com TLS + the supervisor read, so a provisioned rig
// can immediately serve mutual-TLS com. PEM bodies are carried inline (the link
// is already TLS when a cert is deployed; first-enrollment is over the LAN).
message ProvisionRequest {
    string machine     = 1;   // the machine name (manifest dir), e.g. "rig1-central"
    string uuid        = 2;   // rig UUID (→ <dir>/uuid)
    string vin         = 3;   // rig VIN  (→ <dir>/vin)
    string client_key  = 4;   // PEM private key (→ certs/client.key, 0600)
    string client_cert = 5;   // PEM cert       (→ certs/client.crt)
    string ca_chain    = 6;   // PEM CA chain   (→ certs/server_ca.crt)
    string vpn_authkey = 7;   // OPTIONAL Headscale preauth key (→ certs/vpn.authkey)
}
message ProvisionReply {
    bool   ok       = 1;
    string message  = 2;      // human detail / the failure
    repeated string written = 3;   // the absolute paths actually written
}

// Report what a rig already has provisioned (idempotency / verify). Returns the
// identity + which cred files are present (NOT their contents).
message ProvisionStatusRequest { }
message ProvisionStatusReply {
    string machine        = 1;
    string uuid           = 2;
    string vin            = 3;
    bool   has_client_key = 4;
    bool   has_client_cert = 5;
    bool   has_ca_chain   = 6;
    bool   has_vpn_authkey = 7;
}

service Provisioning {
    // Write the rig's identity (uuid/vin) + PKI creds + optional VPN authkey.
    rpc Provision (ProvisionRequest) returns (ProvisionReply);
    // What's already provisioned on this rig (identity + cred presence).
    rpc GetProvisionStatus (ProvisionStatusRequest) returns (ProvisionStatusReply);
}

// ---- DiagView — services/diag (ara::diag DoIP/UDS) over com gRPC ----------
//
// com proxies the diag FC's UDS router so the GUI / a tester can run a UDS
// request (read a DID, read DTCs) over com without a DoIP TCP client or a TIPC
// client. DiagLink RemoteRef-calls UdsRouter (TIPC 0x80010018, op Handle); this
// edge translates the raw UDS bytes ↔ the libprotobuf DiagView messages. Mirrors
// nm_link/per_link (isolated nanopb TU). v1 = operator-initiated reads (SendUds);
// a live diag-traffic stream is a follow-up.
message DiagUdsRequest {
    uint32 target_addr = 1;   // the logical ECU address (0 = the gateway default)
    bytes  uds         = 2;   // the UDS request bytes (e.g. 22 F1 90 = ReadDID VIN)
}
message DiagUdsReply {
    bytes  uds    = 1;        // the UDS response bytes
    bool   is_nrc = 2;        // true = a Negative Response (7F sid nrc)
    bool   ok     = 3;        // false = diag link unreachable / no reply
}

service DiagView {
    // Run one UDS request through the diag FC's router; return the response.
    rpc SendUds (DiagUdsRequest) returns (DiagUdsReply);
}
