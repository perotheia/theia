// services/log[trace] — trace EGRESS gRPC, served by the collector itself.
//
// Egress-direct design (docs/tasks/BACKLOG/trace-to-rf-via-com.md): the
// trace collector exposes its OWN gRPC Subscribe hook — com is NOT in the
// byte path for trace records. com still governs the DMZ (it authorizes /
// firewalls this external port) and still owns the CONTROL path
// (ConfigureTrace → supervisor → node, on SupervisorView).
//
// TraceRecord is imported from supervisor_bridge.proto (the record shape's
// single home; same field numbers the nanopb log.proto emits). Only the
// service + its request live here.

syntax = "proto3";

package services.log;

import "supervisor_bridge.proto";

// Per-stream subscribe request. Optional filters applied collector-side:
//   kind        — TraceKind value (call/cast × in/out, statem); 0 = all
//   target_node — restrict to one source node (component name); "" = all
// (Enable/disable of a node's tracer is the separate CONTROL path via
// com's ConfigureTrace; this filter is just stream-side selection.)
message TraceSubscribeRequest {
    uint32 kind        = 1;   // TraceKind value; 0 = all kinds
    string target_node = 2;   // component name; "" = all nodes
}

service TraceStream {
    // Server-streaming firehose of trace records. The collector rewrites
    // src/dst from TIPC node addresses to component names (via the cluster
    // netgraph.json it digests at startup) before streaming. Clients open
    // one per machine and read until they close the stream.
    rpc Subscribe(TraceSubscribeRequest) returns (stream services.com.TraceRecord);
}
