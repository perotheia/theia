name: root
strategy: one_for_all
max_restarts: 3
max_seconds: 5
tombstone_dir: /tmp/tombstones
children:
- name: ar_sup
  strategy: rest_for_one
  max_restarts: 3
  max_seconds: 5
  children:
  - name: core_sup
    strategy: rest_for_one
    max_restarts: 3
    max_seconds: 5
    children:
    - name: exec
      start_cmd: []
      restart: permanent
      shutdown: 5000
      type: worker
      modules:
      - services/exec
      nodes:
      - name: ExecDaemon
        reporting: true
        tipc_type: '0x80010005'
        tipc_instance: '0'
    - name: core
      start_cmd: []
      restart: permanent
      shutdown: 5000
      type: worker
      modules:
      - services/core
      nodes:
      - name: CoreDaemon
        reporting: true
        tipc_type: '0x80010001'
        tipc_instance: '0'
    - name: crypto
      start_cmd: []
      restart: permanent
      shutdown: 5000
      type: worker
      modules:
      - services/crypto
      nodes:
      - name: CryptoDaemon
        reporting: true
        tipc_type: '0x80010006'
        tipc_instance: '0'
    - name: sm
      start_cmd:
      - bazel-bin/services/sm/main/sm
      restart: permanent
      shutdown: 5000
      type: worker
      modules:
      - services/sm
      nodes:
      - name: SmDaemon
        reporting: true
        tipc_type: '0x8001000D'
        tipc_instance: '0'
    - name: network_sup
      strategy: one_for_one
      max_restarts: 3
      max_seconds: 5
      children:
      - name: nm
        start_cmd: []
        restart: permanent
        shutdown: 5000
        type: worker
        modules:
        - services/nm
        nodes:
        - name: NmDaemon
          reporting: true
          tipc_type: '0x80010009'
          tipc_instance: '0'
      - name: com
        start_cmd:
        - bazel-bin/services/com/main/com
        restart: permanent
        shutdown: 5000
        type: worker
        modules:
        - services/com
        nodes:
        - name: ComDaemon
          reporting: true
          tipc_type: '0x80010008'
          tipc_instance: '0'
      - name: osi
        start_cmd: []
        restart: permanent
        shutdown: 5000
        type: worker
        modules:
        - services/osi
        nodes:
        - name: OsiDaemon
          reporting: true
          tipc_type: '0x80010002'
          tipc_instance: '0'
      - name: idsm
        start_cmd: []
        restart: permanent
        shutdown: 5000
        type: worker
        modules:
        - services/idsm
        nodes:
        - name: IdsmDaemon
          reporting: true
          tipc_type: '0x8001000B'
          tipc_instance: '0'
      - name: diag
        start_cmd: []
        restart: permanent
        shutdown: 5000
        type: worker
        modules:
        - services/diag
        nodes:
        - name: DiagDaemon
          reporting: true
          tipc_type: '0x8001000C'
          tipc_instance: '0'
      - name: tsync
        start_cmd: []
        restart: permanent
        shutdown: 5000
        type: worker
        modules:
        - services/tsync
        nodes:
        - name: TsyncDaemon
          reporting: true
          tipc_type: '0x80010004'
          tipc_instance: '0'
    - name: host_svc_sup
      strategy: one_for_one
      max_restarts: 3
      max_seconds: 5
      children:
      - name: per
        start_cmd:
        - bazel-bin/services/per/main/per
        restart: permanent
        shutdown: 5000
        type: worker
        modules:
        - services/per
        nodes:
        - name: PerDaemon
          reporting: true
          tipc_type: '0x80010007'
          tipc_instance: '0'
      - name: rds
        start_cmd: []
        restart: permanent
        shutdown: 5000
        type: worker
        modules:
        - services/rds
        nodes:
        - name: RdsDaemon
          reporting: true
          tipc_type: '0x80010010'
          tipc_instance: '0'
    - name: pltf_sup
      strategy: one_for_one
      max_restarts: 3
      max_seconds: 5
      children:
      - name: phm
        start_cmd: []
        restart: permanent
        shutdown: 5000
        type: worker
        modules:
        - services/phm
        nodes:
        - name: PhmDaemon
          reporting: true
          tipc_type: '0x8001000A'
          tipc_instance: '0'
      - name: ucm
        start_cmd:
        - bazel-bin/services/ucm/main/ucm
        restart: permanent
        shutdown: 5000
        type: worker
        modules:
        - services/ucm
        nodes:
        - name: UcmDaemon
          reporting: true
          tipc_type: '0x8001000E'
          tipc_instance: '0'
      - name: vucm
        start_cmd: []
        restart: permanent
        shutdown: 5000
        type: worker
        modules:
        - services/vucm
        nodes:
        - name: VucmDaemon
          reporting: true
          tipc_type: '0x8001000F'
          tipc_instance: '0'
      - name: fw
        start_cmd: []
        restart: permanent
        shutdown: 5000
        type: worker
        modules:
        - services/fw
        nodes:
        - name: FwDaemon
          reporting: true
          tipc_type: '0x80010011'
          tipc_instance: '0'
  - name: app_sup
    strategy: one_for_one
    max_restarts: 3
    max_seconds: 5
    children:
    - name: supervisor
      start_cmd:
      - vendor/apps/supervisor/daemon.sh
      restart: permanent
      shutdown: 5000
      type: worker
      modules:
      - //platform/supervisor:ipk
    - name: gateway
      start_cmd:
      - vendor/apps/gateway/daemon.sh
      restart: permanent
      shutdown: 5000
      type: worker
      modules:
      - //platform/gateway:ipk
